<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7ec8ff" />
  <title>🏙️ Mi Ciudad — Cajero & Shopping</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏙️</text></svg>" />
  <style>
  :root{
    --azul:#2a6df4; --azul-osc:#1b4bb0; --verde:#25b85f; --verde-osc:#1c9149;
    --rojo:#e8453c; --amarillo:#ffce00; --gris:#eef2f8; --texto:#1f2a44;
    --radio:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:"Comic Sans MS","Trebuchet MS","Segoe UI",system-ui,sans-serif;
    color:var(--texto);background:#bfe3ff;overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }
  #app{position:fixed;inset:0;}

  /* ---------- Botones genéricos ---------- */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    border:none;border-radius:var(--radio);padding:16px;font-size:19px;font-weight:800;
    font-family:inherit;color:#fff;background:var(--azul);box-shadow:0 6px 0 rgba(0,0,0,.18);
    cursor:pointer;margin:8px 0;transition:transform .05s;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .btn.verde{background:var(--verde);}
  .btn.rojo{background:var(--rojo);}
  .btn.amarillo{background:var(--amarillo);color:var(--texto);}
  .btn.gris{background:#c4cee0;color:var(--texto);}
  .btn:disabled{filter:grayscale(.6) opacity(.6);}
  .btn .emoji{font-size:24px;}

  /* ---------- HUD plata ---------- */
  .hud{position:absolute;top:8px;left:8px;right:58px;display:flex;gap:8px;z-index:30;pointer-events:none;}
  .hud .chip{flex:1;background:rgba(255,255,255,.92);border-radius:14px;padding:6px 8px;
    text-align:center;box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .hud .et{font-size:11px;opacity:.7;}
  .hud .mo{font-size:17px;font-weight:800;}
  .hud .banco .mo{color:var(--azul-osc);} .hud .efe .mo{color:var(--verde-osc);}
  .hud .mon .mo{color:#c98a00;}

  /* botón sonido */
  .sonido-btn{position:absolute;top:8px;right:8px;border:none;background:rgba(255,255,255,.92);
    border-radius:50%;width:42px;height:42px;font-size:18px;box-shadow:0 3px 0 rgba(0,0,0,.12);
    cursor:pointer;z-index:40;}

  /* =====================================================================
     PERSONAJE PRO (dibujado con CSS, camina de verdad)
     ===================================================================== */
  .person{position:relative;width:calc(42px*var(--s));height:calc(74px*var(--s));
    display:inline-block;vertical-align:bottom;}
  .person::after{content:"";position:absolute;bottom:calc(-4px*var(--s));left:50%;
    transform:translateX(-50%);width:calc(34px*var(--s));height:calc(8px*var(--s));
    background:rgba(0,0,0,.18);border-radius:50%;filter:blur(1px);z-index:0;}
  .person .p-head{position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:calc(27px*var(--s));height:calc(27px*var(--s));border-radius:50%;
    background:var(--skin);z-index:3;box-shadow:inset calc(-3px*var(--s)) calc(-2px*var(--s)) rgba(0,0,0,.12);}
  .person .p-hair{position:absolute;top:calc(-5px*var(--s));left:calc(-3px*var(--s));
    right:calc(-3px*var(--s));height:calc(15px*var(--s));background:var(--pelo);
    border-radius:50% 50% 45% 45%;}
  .person .p-eye{position:absolute;top:52%;width:calc(3.4px*var(--s));height:calc(4.4px*var(--s));
    background:#27313f;border-radius:50%;z-index:4;}
  .person .p-eye.l{left:30%;} .person .p-eye.r{right:30%;}
  .person .p-smile{position:absolute;bottom:16%;left:50%;transform:translateX(-50%);
    width:42%;height:24%;border:calc(2.2px*var(--s)) solid #c0473b;border-top:none;
    border-radius:0 0 60px 60px;}
  .person .p-acc{position:absolute;top:calc(-13px*var(--s));left:50%;transform:translateX(-50%);
    font-size:calc(19px*var(--s));z-index:5;line-height:1;}
  .person .p-body{position:absolute;top:calc(23px*var(--s));left:50%;transform:translateX(-50%);
    width:calc(31px*var(--s));height:calc(31px*var(--s));background:var(--ropa);
    border-radius:14px 14px 9px 9px;z-index:2;
    box-shadow:inset calc(-4px*var(--s)) 0 rgba(0,0,0,.1);}
  .person .p-arm{position:absolute;top:calc(25px*var(--s));width:calc(8px*var(--s));
    height:calc(25px*var(--s));background:var(--ropa);border-radius:7px;z-index:1;}
  .person .p-arm.l{left:calc(50% - 20px*var(--s));transform-origin:top center;}
  .person .p-arm.r{right:calc(50% - 20px*var(--s));transform-origin:top center;}
  .person .p-leg{position:absolute;bottom:0;width:calc(10px*var(--s));height:calc(24px*var(--s));
    background:var(--pant);border-radius:6px 6px 5px 5px;z-index:1;}
  .person .p-leg.l{left:calc(50% - 11px*var(--s));transform-origin:top center;}
  .person .p-leg.r{right:calc(50% - 11px*var(--s));transform-origin:top center;}
  .person.izq{transform:scaleX(-1);}

  @keyframes swingA{0%,100%{transform:rotate(20deg);}50%{transform:rotate(-20deg);}}
  @keyframes swingB{0%,100%{transform:rotate(-20deg);}50%{transform:rotate(20deg);}}
  .person.walk .p-arm.l,.person.walk .p-leg.r{animation:swingA .42s ease-in-out infinite;}
  .person.walk .p-arm.r,.person.walk .p-leg.l{animation:swingB .42s ease-in-out infinite;}
  @keyframes respira{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-2px);}}
  .person:not(.walk) .p-head{animation:respira 2.4s ease-in-out infinite;}
  /* sentado (food court) */
  .person.sit .p-leg.l{transform:rotate(78deg);}
  .person.sit .p-leg.r{transform:rotate(78deg);}
  .person.sit{height:calc(58px*var(--s));}

  /* =====================================================================
     AUTO PRO (dibujado con CSS, más grande)
     ===================================================================== */
  .car{position:relative;width:calc(108px*var(--cs,1));height:calc(50px*var(--cs,1));}
  .car .c-body{position:absolute;bottom:calc(9px*var(--cs,1));left:0;right:0;
    height:calc(24px*var(--cs,1));background:var(--c);border-radius:12px 16px 7px 7px;
    box-shadow:inset 0 calc(-6px*var(--cs,1)) rgba(0,0,0,.16),0 calc(4px*var(--cs,1)) 0 rgba(0,0,0,.18);}
  .car .c-cabin{position:absolute;top:calc(2px*var(--cs,1));left:24%;width:50%;
    height:calc(22px*var(--cs,1));background:var(--c);border-radius:12px 12px 0 0;
    box-shadow:inset 0 calc(4px*var(--cs,1)) rgba(255,255,255,.18);}
  .car .c-win{position:absolute;top:calc(5px*var(--cs,1));left:28%;width:42%;
    height:calc(15px*var(--cs,1));background:linear-gradient(160deg,#dff3ff,#a9d8ff);
    border-radius:8px;border:calc(2px*var(--cs,1)) solid rgba(0,0,0,.15);}
  .car .c-light{position:absolute;bottom:calc(16px*var(--cs,1));right:calc(2px*var(--cs,1));
    width:calc(7px*var(--cs,1));height:calc(7px*var(--cs,1));background:#fff3a0;border-radius:50%;
    box-shadow:0 0 calc(6px*var(--cs,1)) #ffe14a;}
  .car .wheel{position:absolute;bottom:0;width:calc(20px*var(--cs,1));height:calc(20px*var(--cs,1));
    background:#1b1f24;border-radius:50%;border:calc(5px*var(--cs,1)) solid #6a727c;}
  .car .wheel.f{right:calc(13px*var(--cs,1));} .car .wheel.b{left:calc(13px*var(--cs,1));}

  /* ---------- Pantalla elegir avatar ---------- */
  .pick{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:flex-start;gap:12px;padding:24px 18px;overflow-y:auto;
    background:linear-gradient(160deg,#aee0ff,#d6f3ff 50%,#fff3c4);}
  .pick h1{font-size:28px;margin:6px 0 0;text-align:center;}
  .pick p{margin:0;opacity:.78;text-align:center;}
  .chars{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:380px;width:100%;}
  .char{background:#fff;border:3px solid transparent;border-radius:16px;padding:8px 0 4px;
    text-align:center;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.1);}
  .char .cn{font-size:11px;font-weight:800;opacity:.7;}
  .char.sel{border-color:var(--azul);transform:scale(1.05);background:#eaf3ff;}
  .pick input{font-family:inherit;font-size:18px;padding:12px 14px;border-radius:14px;
    border:2px solid #cdd8ea;width:100%;max-width:380px;text-align:center;}
  .pick .btn{max-width:380px;}
  .toggle-vuelto{max-width:380px;width:100%;background:#fff;border-radius:16px;padding:12px 14px;
    box-shadow:0 4px 0 rgba(0,0,0,.1);display:flex;align-items:center;gap:10px;cursor:pointer;}
  .toggle-vuelto .tv-txt{flex:1;text-align:left;font-size:14px;line-height:1.2;}
  .toggle-vuelto .tv-txt b{font-size:15px;}
  .sw{width:54px;height:30px;border-radius:999px;background:#c4cee0;position:relative;flex:0 0 auto;
    transition:background .15s;}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;
    background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.2);transition:left .15s;}
  .sw.on{background:var(--verde);} .sw.on::after{left:27px;}

  /* ---------- Ciudad ---------- */
  .ciudad{position:absolute;inset:0;overflow:hidden;
    background:linear-gradient(#8fd3ff 0%,#bfe6ff 45%,#e9f7ff 60%);}
  .sol{position:absolute;top:6%;right:14%;font-size:54px;animation:girar 18s linear infinite;}
  @keyframes girar{to{transform:rotate(360deg);}}
  .nube{position:absolute;font-size:46px;opacity:.95;animation:nubeAnda linear infinite;}
  @keyframes nubeAnda{from{transform:translateX(-22vw);}to{transform:translateX(120vw);}}

  .vereda{position:absolute;left:0;right:0;bottom:18%;height:14%;background:#cfd6df;
    border-top:4px solid #b9c1cc;}
  .vereda::after{content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(90deg,transparent 0 46px,#b9c1cc 46px 50px);opacity:.6;}
  .calle{position:absolute;left:0;right:0;bottom:0;height:18%;background:#4a5560;}
  .calle::before{content:"";position:absolute;top:50%;left:0;right:0;height:5px;transform:translateY(-50%);
    background-image:repeating-linear-gradient(90deg,#ffd54a 0 34px,transparent 34px 66px);}

  .edificio{position:absolute;bottom:32%;transform:translateX(-50%);cursor:pointer;text-align:center;}
  .edificio .cuerpo{width:128px;height:138px;border-radius:12px 12px 6px 6px;position:relative;
    box-shadow:0 8px 0 rgba(0,0,0,.15);display:flex;align-items:flex-end;justify-content:center;}
  .edificio .techo{position:absolute;top:-16px;left:-8px;right:-8px;height:20px;border-radius:8px;}
  .edificio .puerta{width:44px;height:58px;background:linear-gradient(#5a4636,#3a2a1e);border-radius:8px 8px 0 0;
    border:3px solid rgba(0,0,0,.2);}
  .edificio .ventana{position:absolute;width:24px;height:24px;background:#bfe9ff;border-radius:4px;
    border:2px solid rgba(255,255,255,.6);}
  .edificio .cartel{position:absolute;top:-46px;left:50%;transform:translateX(-50%);white-space:nowrap;
    background:#fff;border-radius:12px;padding:4px 12px;font-size:14px;font-weight:800;
    box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .edificio .cartel .ico{font-size:18px;}
  .edificio:active{transform:translateX(-50%) scale(.97);}
  .toque{position:absolute;top:-70px;left:50%;transform:translateX(-50%);font-size:12px;
    background:var(--amarillo);border-radius:10px;padding:2px 8px;font-weight:800;
    animation:flota 1.4s ease-in-out infinite;}
  @keyframes flota{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-5px);}}

  .deco{position:absolute;transform:translateX(-50%);font-size:34px;cursor:pointer;line-height:1;}
  .deco.fija{cursor:default;}
  .auto-cap{position:absolute;animation:cruza linear infinite;z-index:6;}
  @keyframes cruza{from{left:-160px;}to{left:108%;}}
  .moneda{position:absolute;transform:translateX(-50%);font-size:30px;cursor:pointer;z-index:15;
    animation:brilla 1s ease-in-out infinite;filter:drop-shadow(0 0 5px gold);}
  @keyframes brilla{0%,100%{transform:translateX(-50%) translateY(0) scale(1);}50%{transform:translateX(-50%) translateY(-6px) scale(1.12);}}

  .npc{position:absolute;bottom:24%;transform:translateX(-50%);z-index:14;}
  .avatar{position:absolute;bottom:24%;transform:translateX(-50%);z-index:20;
    transition:left .25s linear;will-change:left;}
  .burbuja{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#fff;
    border-radius:12px;padding:4px 10px;font-size:14px;font-weight:700;white-space:nowrap;
    box-shadow:0 3px 0 rgba(0,0,0,.12);z-index:30;}
  .pista-piso{position:absolute;bottom:1%;left:0;right:0;text-align:center;font-size:12px;
    color:#fff;text-shadow:0 1px 2px #000;}

  /* ---------- Paneles interiores ---------- */
  .vista{position:absolute;inset:0;display:flex;flex-direction:column;padding:12px;
    max-width:560px;margin:0 auto;}
  .cabecera{display:flex;align-items:center;gap:10px;margin:34px 0 10px;}
  .cabecera .volver{border:none;background:#fff;border-radius:12px;padding:9px 13px;font-size:18px;
    font-weight:800;font-family:inherit;box-shadow:0 4px 0 rgba(0,0,0,.1);cursor:pointer;}
  .cabecera h2{margin:0;font-size:20px;flex:1;}
  .panel{background:#fff;border-radius:var(--radio);padding:16px;box-shadow:0 6px 0 rgba(0,0,0,.08);}
  .globo{background:#fff8d6;border:3px dashed var(--amarillo);border-radius:16px;padding:12px;
    text-align:center;font-size:16px;margin:10px 0;}
  .titulo{text-align:center;font-size:24px;font-weight:800;margin:6px 0 14px;}

  /* ---------- Cajero ---------- */
  .cajero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#3a4a5e,#243443);}
  .atm{position:relative;width:240px;margin:6px auto 0;background:#dfe6ee;border-radius:18px;
    padding:14px;box-shadow:0 10px 0 #9aa7b5, inset 0 2px 6px #fff;}
  .atm .marca{text-align:center;font-weight:800;color:#345;letter-spacing:1px;margin-bottom:8px;}
  .atm .screen{background:#0b2a4a;color:#cde9ff;border-radius:10px;padding:14px;min-height:84px;
    text-align:center;font-size:16px;display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 0 16px rgba(0,0,0,.6);}
  .atm .slot{margin:12px auto 4px;width:120px;height:14px;background:#222;border-radius:7px;
    box-shadow:inset 0 2px 4px #000;position:relative;}
  .atm .slot::after{content:"INSERTÁ AQUÍ";position:absolute;top:16px;left:0;right:0;text-align:center;
    font-size:9px;color:#345;font-weight:800;}
  .atm .luces{display:flex;justify-content:center;gap:6px;margin-top:14px;}
  .atm .luces i{width:8px;height:8px;border-radius:50%;background:#7bd88f;display:block;
    animation:parpadeo 1.2s infinite;}
  .atm .luces i:nth-child(2){animation-delay:.4s;background:#ffd54a;}
  .atm .luces i:nth-child(3){animation-delay:.8s;background:#7fb6ff;}
  @keyframes parpadeo{50%{opacity:.3;}}

  .tarjeta{position:absolute;left:50%;width:96px;height:60px;border-radius:8px;
    background:linear-gradient(135deg,#ffb347,#ff7e5f);box-shadow:0 6px 12px rgba(0,0,0,.4);
    transform:translateX(-50%);z-index:5;}
  .tarjeta .chip{position:absolute;top:10px;left:10px;width:16px;height:12px;border-radius:3px;
    background:linear-gradient(#ffe082,#c9a227);}
  .tarjeta .raya{position:absolute;bottom:10px;left:8px;right:8px;height:6px;background:rgba(255,255,255,.6);border-radius:3px;}
  .tarjeta .marca{position:absolute;top:8px;right:10px;font-size:9px;font-weight:800;color:#fff;}
  .tarjeta.insertando{animation:insertar 1.1s forwards;}
  .tarjeta.saliendo{animation:expulsar 1.1s forwards;}
  @keyframes insertar{
    0%{top:78%;opacity:1;transform:translateX(-50%) scale(1);}
    70%{top:30%;opacity:1;transform:translateX(-50%) scale(.9);}
    100%{top:24%;opacity:0;transform:translateX(-50%) scale(.55);}
  }
  @keyframes expulsar{
    0%{top:24%;opacity:0;transform:translateX(-50%) scale(.55);}
    30%{top:30%;opacity:1;transform:translateX(-50%) scale(.9);}
    100%{top:78%;opacity:1;transform:translateX(-50%) scale(1);}
  }
  .mano{position:absolute;left:50%;transform:translateX(-50%);bottom:8%;font-size:40px;}

  .pin-display{letter-spacing:12px;font-size:34px;text-align:center;margin:8px 0;min-height:40px;
    color:var(--azul-osc);font-weight:800;}
  .teclado{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .tecla{border:none;border-radius:12px;padding:16px;font-size:24px;font-weight:800;font-family:inherit;
    background:var(--gris);color:var(--texto);box-shadow:0 4px 0 rgba(0,0,0,.12);cursor:pointer;}
  .tecla:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.12);}
  .tecla.ok{background:var(--verde);color:#fff;} .tecla.borrar{background:var(--amarillo);}

  /* =====================================================================
     MALL INTERIOR (mundo que se recorre caminando)
     ===================================================================== */
  .mall-scene{position:absolute;inset:0;overflow:hidden;background:#2b3550;}
  .mall-world{position:absolute;top:0;bottom:0;left:0;will-change:transform;
    transition:transform .4s linear;}
  /* techo con luces */
  .m-techo{position:absolute;top:0;left:0;right:0;height:11%;
    background:linear-gradient(#e8eef7,#cdd7e6);border-bottom:5px solid #b7c2d4;}
  .m-techo .luz{position:absolute;top:38%;width:46px;height:12px;border-radius:8px;
    background:#fff7c4;box-shadow:0 0 18px #ffe98a;}
  /* segundo piso con baranda */
  .m-piso2{position:absolute;top:11%;left:0;right:0;height:16%;
    background:linear-gradient(#dfe7f2,#cbd5e6);border-bottom:6px solid #aab6c9;}
  .m-baranda{position:absolute;bottom:0;left:0;right:0;height:46px;
    border-top:4px solid #9aa7bd;
    background:repeating-linear-gradient(90deg,rgba(150,170,200,.35) 0 4px,transparent 4px 26px);}
  /* pared media */
  .m-pared{position:absolute;top:27%;left:0;right:0;bottom:24%;
    background:linear-gradient(#f3f6fb,#e6ecf5);}
  /* piso */
  .m-piso{position:absolute;left:0;right:0;bottom:0;height:24%;
    background:linear-gradient(#d7deea,#c3cdde);
    border-top:4px solid #b3bdd0;}
  .m-piso::after{content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(90deg,transparent 0 56px,rgba(120,135,160,.25) 56px 60px),
      repeating-linear-gradient(0deg,transparent 0 30px,rgba(120,135,160,.18) 30px 32px);}
  .m-tap{position:absolute;left:0;right:0;bottom:0;top:11%;z-index:1;cursor:pointer;}
  /* las decoraciones y personajes dejan pasar el toque al piso (para caminar) */
  .m-techo,.m-piso2,.m-pared,.m-piso,.m-prop,.m-mesa,.m-cartel,.m-npc,.m-avatar,.escalera{pointer-events:none;}
  .mall-scene .hud{left:62px;right:56px;}

  /* local / vidriera */
  .local{position:absolute;bottom:24%;transform:translateX(-50%);width:210px;cursor:pointer;z-index:4;}
  .local .toldo{position:relative;height:26px;border-radius:8px 8px 0 0;overflow:hidden;
    background:var(--lc);box-shadow:0 4px 0 rgba(0,0,0,.12);}
  .local .toldo::after{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(90deg,rgba(255,255,255,.85) 0 18px,transparent 18px 36px);}
  .local .rotulo{position:absolute;top:-30px;left:50%;transform:translateX(-50%);white-space:nowrap;
    background:#fff;border-radius:12px;padding:4px 12px;font-size:14px;font-weight:800;
    box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .local .vidriera{height:118px;background:linear-gradient(160deg,#e9f6ff,#bfe2ff);
    border:5px solid #fff;border-top:none;border-radius:0 0 10px 10px;position:relative;
    display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;padding:8px;
    box-shadow:inset 0 0 22px rgba(0,80,160,.12);}
  .local .vidriera span{font-size:30px;}
  .local .puerta-l{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:46px;height:54px;background:linear-gradient(#bfe9ff,#7fc6ff);border:3px solid #fff;
    border-bottom:none;border-radius:6px 6px 0 0;}
  .local .entrar{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);white-space:nowrap;
    background:var(--verde);color:#fff;border-radius:10px;padding:2px 10px;font-size:12px;font-weight:800;
    box-shadow:0 3px 0 rgba(0,0,0,.18);animation:flota 1.4s ease-in-out infinite;}
  .local:active{transform:translateX(-50%) scale(.98);}

  /* escalera mecánica */

    else if(s==="cajero") renderCajero();
    else if(s==="mall") renderMall();

    const per=document.getElementById("cityperson");

    function caminarA(x, cb){
      x=clamp(x,5,95);
      const dist=Math.abs(x-estado.avatarX);
      const dur=Math.max(.35, dist/22);
      per.classList.toggle("izq", x<estado.avatarX);
      per.classList.add("walk");
      av.style.transition=`left ${dur}s linear`;
      let n=Math.round(dur/0.18), c=0;
      const tic=setInterval(()=>{sPaso();if(++c>=n)clearInterval(tic);},180);
      requestAnimationFrame(()=>{ av.style.left=x+"%"; });
      estado.avatarX=x;
      setTimeout(()=>{ per.classList.remove("walk"); clearInterval(tic); if(cb)cb(); }, dur*1000+20);

      const old=host.querySelector(".burbuja"); if(old)old.remove();

      host.appendChild(b); setTimeout(()=>b.remove(),1400);

    function actualizarHud(){
      const chips=$app().querySelectorAll(".hud .mo");
      if(chips[1])chips[1].textContent=plata(estado.efectivo);
      if(chips[2])chips[2].textContent=estado.monedas;
      guardar();
    }
  }

  function expulsarYsalir(){
    sOk(); estado.tarjetaDentro=false; estado.cajeroPaso="saliendo"; render();
    setTimeout(()=>{ estado.cajeroPaso="acercarse"; irA("ciudad"); }, 1150);
  }
  function construirTeclado(){
    const t=["1","2","3","4","5","6","7","8","9","borrar","0","ok"];
    const c=document.getElementById("teclado");
    c.innerHTML=t.map(k=>{
      if(k==="borrar")return `<button class="tecla borrar" data-k="borrar">⌫</button>`;
      if(k==="ok")return `<button class="tecla ok" data-k="ok">OK</button>`;
      return `<button class="tecla" data-k="${k}">${k}</button>`;}).join("");
    c.querySelectorAll("[data-k]").forEach(b=>b.onclick=()=>tecla(b.dataset.k));
  }
  function tecla(k){
    if(k==="borrar"){sTecla();estado.pinEscrito=estado.pinEscrito.slice(0,-1);render();return;}
    if(k==="ok"){verificarPin();return;}
    if(estado.pinEscrito.length<4){sTecla();estado.pinEscrito+=k;render();}
  }
  function verificarPin(){
    if(estado.pinEscrito===CONFIG.claveCorrecta){ sOk(); estado.cajeroPaso="menu"; render(); }
    else{ sError(); estado.intentos--; estado.pinEscrito="";
      if(estado.intentos<=0){ estado.tarjetaDentro=false; estado.cajeroPaso="saliendo"; render();
        setTimeout(()=>{estado.cajeroPaso="acercarse";render();},1150);
      } else { render(); const pd=document.querySelector(".pin-display"); if(pd)pd.classList.add("tiembla"); } }
  }
  function extraer(m){
    if(m>estado.saldoBanco){sError();return;}
    sMoneda(); estado.saldoBanco-=m; estado.efectivo+=m; estado.cajeroPaso="menu"; render();
    document.getElementById("msg").innerHTML=`💸 Sacaste ${plata(m)}.<br>Ahora tenés ${plata(estado.efectivo)} 👛`;
  }

  function camara(){
    const sw=window.innerWidth;
    let cam = clamp(estado.mallX - sw/2, 0, Math.max(0,MALL_W-sw));
    estado.cam=cam;
    const world=document.getElementById("mworld");
    if(world) world.style.transform=`translateX(${-cam}px)`;
  }
  function caminarMallA(x, cb){
    x=clamp(x,120,MALL_W-120);
    const dist=Math.abs(x-estado.mallX);
    const av=document.getElementById("mavatar");
    const per=document.getElementById("mallperson");
    const world=document.getElementById("mworld");
    if(!av){ if(cb)cb(); return; }
    if(dist<6){ if(cb)cb(); return; }
    const dur=Math.max(.3, dist/360);
    per.classList.toggle("izq", x<estado.mallX);
    per.classList.add("walk");
    estado.mallX=x;
    av.style.transition=`left ${dur}s linear`;
    if(world) world.style.transition=`transform ${dur}s linear`;
    let n=Math.round(dur/0.2), c=0;
    const tic=setInterval(()=>{sPaso();if(++c>=n)clearInterval(tic);},200);
    requestAnimationFrame(()=>{ av.style.left=x+"px"; camara(); });
    clearTimeout(estado._mt);
    estado._mt=setTimeout(()=>{ per.classList.remove("walk"); clearInterval(tic); if(cb)cb(); }, dur*1000+30);
  }

  /* =====================================================================
     CATÁLOGO DE UNA TIENDA
     ===================================================================== */
  function totalCarrito(){ return Object.entries(estado.carrito).reduce((t,[id,c])=>{
    const p=PRODUCTOS.find(x=>x.id===id); return t+(p?p.precio*c:0);},0); }

  function renderTienda(){
    const t=estado.tiendaActiva;
    const info=TIENDAS_MALL.find(s=>s.t===t)||{emoji:"🛍️"};
    const items=PRODUCTOS.filter(p=>p.tienda===t).map(p=>{
      const c=estado.carrito[p.id]||0, no=totalCarrito()+p.precio>estado.efectivo&&c===0;
      return `<div class="producto ${no?"no-alcanza":""}" data-p="${p.id}">
        ${c>0?`<div class="badge">${c}</div>`:""}
        <div class="pemoji">${p.emoji}</div><div class="pnombre">${p.nombre}</div>
        <div class="pprecio">${plata(p.precio)}</div></div>`;}).join("");
    const tot=totalCarrito(), cant=Object.values(estado.carrito).reduce((a,b)=>a+b,0);

    $app().innerHTML=`<div class="tienda-bg"></div>
      <div class="vista">
        ${cabecera(`${info.emoji} ${t}`)}
        ${hud()}
        <div style="margin:6px 0 8px;display:flex;align-items:center;gap:8px">
          ${personHTML(avAct(),0.5)} <b>${estado.nombre||"Vos"}</b> de compras 🛍️</div>
        <div class="productos">${items}</div>
        ${cant>0?`<div class="carrito-barra" id="pagar"><span>🛒 ${cant} cosa(s)</span><span>Pagar ${plata(tot)} ✅</span></div>`:""}
      </div>`;

    document.getElementById("volver").onclick=()=>{beep(400,.08);irA("mall");};
    $app().querySelectorAll("[data-p]").forEach(el=>el.onclick=()=>agregar(el.dataset.p));
    const pg=document.getElementById("pagar"); if(pg)pg.onclick=irACheckout;
  }
  function agregar(id){
    const p=PRODUCTOS.find(x=>x.id===id); if(!p)return;
    if(totalCarrito()+p.precio>estado.efectivo){ sError(); flash(`No te alcanza 😅. Tenés ${plata(estado.efectivo)}. ¡Andá al cajero! 🏧`); return; }
    sMoneda(); estado.carrito[id]=(estado.carrito[id]||0)+1; render();
  }

  /* =====================================================================
     PAGO + DESAFÍO DEL VUELTO
     ===================================================================== */
  function irACheckout(){
    const tot=totalCarrito(); if(tot===0)return; if(tot>estado.efectivo){sError();return;}
    beep(600,.08);
    // ¿Vas a calcular el vuelto? (al inicio de la operación)
    $app().innerHTML=`<div class="vuelto-bg"></div>
      <div class="vista">
        ${cabecera("🧾 Caja")}
        <div class="panel" style="margin-top:8px">
          <div class="titulo">🧮 ¿Vas a calcular el vuelto?</div>
          <div class="recibo">
            ${resumenCompraHTML()}
            <div class="fila total"><span>Total a pagar</span><span>${plata(tot)}</span></div>
          </div>
          <p style="text-align:center;opacity:.75;margin:12px 0 4px">
            Si decís que sí, vas a elegir cuánto cambio te tienen que dar 💵</p>
          <button class="btn verde" id="siCalc">🧮 ¡Sí, calculo el vuelto!</button>
          <button class="btn gris" id="noCalc">💳 No, pagar justo</button>
        </div>
      </div>`;
    document.getElementById("volver").onclick=()=>{beep(400,.08);irA("tienda");};
    document.getElementById("siCalc").onclick=()=>{ sOk(); prepararVuelto(); estado.scene="vuelto"; renderVuelto(); };
    document.getElementById("noCalc").onclick=()=>{ sOk(); finalizarCompra(totalCarrito(), null); };
  }

  function resumenCompraHTML(){
    return Object.entries(estado.carrito).map(([id,c])=>{
      const p=PRODUCTOS.find(x=>x.id===id);
      return `<div class="fila"><span>${p.emoji} ${p.nombre} x${c}</span><span>${plata(p.precio*c)}</span></div>`;
    }).join("");
  }

  function prepararVuelto(){
    const tot=totalCarrito();
    // pagamos con el primer billete que sea MAYOR al total (así siempre hay vuelto)
    let pagaCon = BILLETES.find(b=>b>tot);
    if(!pagaCon){ // total enorme: redondeamos al próximo 500
      pagaCon = Math.ceil((tot+1)/500)*500;
    }
    const correcto = pagaCon - tot;
    // opciones: la correcta + distractores cercanos
    const set=new Set([correcto]);
    const cand=[correcto+5,correcto-5,correcto+10,correcto-10,correcto+20,pagaCon,tot,correcto+50];
    for(const c of cand){ if(set.size>=4)break; if(c>0 && !set.has(c)) set.add(c); }
    let ops=[...set];
    while(ops.length<4){ const r=correcto+ (Math.floor(Math.random()*8)+1)*5; if(!ops.includes(r)&&r>0)ops.push(r); }
    // mezclar
    for(let i=ops.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ops[i],ops[j]]=[ops[j],ops[i]];}
    estado.pago={tot, pagaCon, correcto, ops, errores:0};
  }

  function renderVuelto(){
    const pg=estado.pago; if(!pg){ irA("tienda"); return; }
    const ayuda = pg.errores>=2
      ? `<div class="globo">Pista 🔑 ${plata(pg.pagaCon)} − ${plata(pg.tot)} = ?</div>` : "";
    $app().innerHTML=`<div class="vuelto-bg"></div>
      <div class="vista">
        ${cabecera("🧮 El vuelto")}
        <div class="panel" style="margin-top:8px">
          <div class="recibo">
            <div class="fila"><span>Tu compra cuesta</span><span><b>${plata(pg.tot)}</b></span></div>
            <div class="fila"><span>Pagás con</span><span><b>${plata(pg.pagaCon)}</b> 💵</span></div>
          </div>
          <div class="titulo" style="margin-top:14px">¿Cuánto vuelto recibís? 🤔</div>
          ${ayuda}
          <div class="opciones-vuelto" id="ops">
            ${pg.ops.map(o=>`<button class="ov" data-o="${o}">${plata(o)}</button>`).join("")}
          </div>
        </div>
      </div>`;
    document.getElementById("volver").onclick=()=>{beep(400,.08);irA("tienda");};
    $app().querySelectorAll("[data-o]").forEach(b=>b.onclick=()=>elegirVuelto(parseInt(b.dataset.o,10),b));
  }

  function elegirVuelto(val, btn){
    const pg=estado.pago;
    if(val===pg.correcto){
      sFiesta(); btn.classList.add("bien");
      setTimeout(()=>finalizarCompra(pg.tot, pg), 450);
    } else {
      sError(); pg.errores++; btn.classList.add("mal"); btn.disabled=true;
      setTimeout(()=>{ btn.classList.remove("mal"); renderVuelto(); }, 600);
    }
  }

  function finalizarCompra(tot, pg){
    sFiesta(); confetti();
    estado.efectivo-=tot;
    const lista=Object.entries(estado.carrito).map(([id,c])=>{const p=PRODUCTOS.find(x=>x.id===id);return `${p.emoji} ${p.nombre} x${c}`;}).join("  ");
    const tienda=estado.tiendaActiva;
    // ¿Adoptamos alguna mascota en esta compra?
    const adoptados=adoptarMascotasDeCarrito();
    estado.carrito={};
    const vueltoMsg = pg
      ? `<div class="globo">✅ ¡Vuelto correcto!<br>Pagaste con ${plata(pg.pagaCon)} y te dieron <b>${plata(pg.correcto)}</b> de vuelto 💵</div>`
      : "";
    const adoptaMsg = adoptados.length
      ? `<div class="globo" style="background:#e3fff0;border-color:#5ad0b0">
           🐾 ¡Adoptaste a <b>${adoptados.map(m=>m.emoji+" "+m.nombre).join(", ")}</b>!<br>
           Llevalo a <b>🐾 Salud Animal</b> para bañarlo, cortarle el pelo y curarlo.</div>`
      : "";
    estado.scene="tienda";
    $app().innerHTML=`<div class="tienda-bg"></div>
      <div class="vista"><div class="panel celebra" style="text-align:center;margin-top:40px">
        <div style="font-size:64px">🎉</div><div class="titulo">¡Compraste!</div>
        <div class="globo">${lista}</div>
        ${vueltoMsg}
        ${adoptaMsg}
        <p>Gastaste <b>${plata(tot)}</b>. Te quedan <b>${plata(estado.efectivo)}</b> 👛</p>
        ${adoptados.length?`<button class="btn" style="background:#2bbf9a" id="avet">🐾 Ir a la veterinaria</button>`:""}
        <button class="btn verde" id="seguir">🛍️ Seguir en esta tienda</button>
        <button class="btn" id="almall">🏬 Volver al shopping</button>
        <button class="btn gris" id="ciudad">🏙️ Salir a la ciudad</button>
      </div></div>`;
    guardar();
    estado.pago=null;
    const avet=document.getElementById("avet");
    if(avet) avet.onclick=()=>{beep(500,.08);estado.vetSel=estado.mascotas.length-1;irA("vet");};
    document.getElementById("seguir").onclick=()=>{beep(500,.08);estado.tiendaActiva=tienda;irA("tienda");};
    document.getElementById("almall").onclick=()=>{beep(500,.08);irA("mall");};
    document.getElementById("ciudad").onclick=()=>{beep(500,.08);irA("ciudad");};
  }

  // Crea las mascotas (con sus cuidados pendientes) según lo comprado en el carrito
  function adoptarMascotasDeCarrito(){
    const nuevos=[];
    for(const [id,c] of Object.entries(estado.carrito)){
      const def=MASCOTAS_ADOPTABLES[id]; if(!def)continue;
      for(let i=0;i<c;i++){
        const nombre=NOMBRES_MASCOTA[Math.floor(Math.random()*NOMBRES_MASCOTA.length)];
        const m={ id:id, emoji:def.emoji, tipo:def.tipo, peludo:def.peludo, nombre,
          limpieza:35, pelo:def.peludo?30:100, salud:50, animo:45 };
        estado.mascotas.push(m); nuevos.push(m);
      }
    }
    return nuevos;
  }

  function confetti(){
    const em=["🎉","🎊","⭐","💫","🪙","💵","🟡","🔵"];
    for(let i=0;i<26;i++){
      const c=document.createElement("div"); c.className="conf"; c.textContent=em[i%em.length];
      c.style.left=Math.random()*100+"vw";
      c.style.animationDuration=(1.4+Math.random()*1.4)+"s";
      c.style.animationDelay=(Math.random()*.4)+"s";
      document.body.appendChild(c); setTimeout(()=>c.remove(),3000);
    }
  }

  /* =====================================================================
     VETERINARIA / SALUD ANIMAL — cuidar a la mascota adoptada
     ===================================================================== */
  function estadoMascota(m){
    const prom=Math.round((m.limpieza+m.pelo+m.salud+m.animo)/4);
    if(prom>=95) return {cara:"🥰", txt:"¡Está feliz y saludable!", ok:true};
    if(prom>=70) return {cara:"🙂", txt:"Está bastante bien.", ok:false};
    if(prom>=45) return {cara:"😟", txt:"Necesita unos cuidados.", ok:false};
    return {cara:"😢", txt:"¡Necesita ayuda urgente!", ok:false};
  }
  function barra(label, emoji, val, color){
    return `<div class="vet-stat">
      <span class="vs-lbl">${emoji} ${label}</span>
      <div class="vs-bar"><div class="vs-fill" style="width:${val}%;background:${color}"></div></div>
      <span class="vs-num">${val}%</span></div>`;
  }

  function renderVet(){
    if(estado.vetSel>=estado.mascotas.length) estado.vetSel=estado.mascotas.length-1;
    const tieneMascotas=estado.mascotas.length>0;

    let cuerpo;
    if(!tieneMascotas){
      cuerpo=`
        <div class="panel" style="text-align:center;margin-top:8px">
          <div style="font-size:60px">🐾</div>
          <div class="titulo">Veterinaria Salud Animal</div>
          <div class="globo">Todavía no tenés ninguna mascota.<br>
            Comprá un 🐶, 🐱 o 🐠 en la tienda <b>Mascotas</b> y traelo acá para cuidarlo 💕</div>
          <button class="btn verde" id="irMascotas">🐶 Ir a Mascotas</button>
          <button class="btn gris" id="almall2">🏬 Volver al shopping</button>
        </div>`;
    } else {
      const m=estado.mascotas[estado.vetSel];
      const est=estadoMascota(m);
      const selector = estado.mascotas.length>1
        ? `<div class="vet-tabs">${estado.mascotas.map((p,i)=>
            `<button class="vtab ${i===estado.vetSel?"activa":""}" data-sel="${i}">${p.emoji} ${p.nombre}</button>`).join("")}</div>`
        : "";
      const servicios = SERVICIOS_VET.map(sv=>{
        const naPet = sv.soloPeludo && !m.peludo;
        const lleno = m[sv.stat]>=100;
        const dis = naPet || lleno;
        const etiqueta = naPet ? "No necesita" : (lleno ? "¡Listo! ✓" : plata(sv.costo));
        return `<button class="vet-serv ${dis?"hecho":""}" data-serv="${sv.id}" ${dis?"disabled":""}>
            <span class="vse">${sv.emoji}</span>
            <span class="vsn">${sv.nombre}</span>
            <span class="vsc">${etiqueta}</span></button>`;
      }).join("");

      cuerpo=`
        ${selector}
        <div class="vet-room">
          <div class="vet-pet" id="vetPet">
            <div class="pet-emoji ${m.limpieza<50?"sucio":""} ${m.peludo&&m.pelo<50?"peludo":""}" id="petEmoji">${m.emoji}</div>
            <div class="pet-cara" id="petCara">${est.cara}</div>
            ${m.salud<50?`<div class="pet-bandage">🩹</div>`:""}
            <div class="vet-fx" id="vetFx"></div>
          </div>
          <div class="vet-mesa"></div>
          <div class="pet-nombre">${m.emoji} <b>${m.nombre}</b> · ${est.txt}</div>
        </div>
        <div class="panel">
          ${barra("Limpieza","🛁",m.limpieza,"#34b3ff")}
          ${barra("Pelo","✂️",m.pelo,"#a06bff")}
          ${barra("Salud","❤️",m.salud,"#ff5d6c")}
          ${barra("Ánimo","😊",m.animo,"#ffb300")}
          <div class="vet-servicios">${servicios}</div>
          ${est.ok?`<div class="globo" style="background:#e3fff0;border-color:#5ad0b0">🏆 ¡${m.nombre} está perfecto! Sos un genio cuidando mascotas.</div>`:""}
        </div>`;
    }

    $app().innerHTML=`<div class="vet-bg"></div>
      <div class="vista">
        ${cabecera("🐾 Salud Animal")}
        ${hud()}
        ${cuerpo}
      </div>`;

    document.getElementById("volver").onclick=()=>{beep(400,.08);irA("mall");};
    const irM=document.getElementById("irMascotas");
    if(irM) irM.onclick=()=>{beep(500,.08);estado.tiendaActiva="Mascotas";estado.carrito={};irA("tienda");};
    const am2=document.getElementById("almall2");
    if(am2) am2.onclick=()=>{beep(400,.08);irA("mall");};
    $app().querySelectorAll("[data-sel]").forEach(b=>b.onclick=()=>{
      beep(550,.07); estado.vetSel=parseInt(b.dataset.sel,10); renderVet(); });
    $app().querySelectorAll("[data-serv]").forEach(b=>b.onclick=()=>hacerServicio(b.dataset.serv));
  }

  function hacerServicio(servId){
    if(estado.vetOcupada) return;
    const sv=SERVICIOS_VET.find(s=>s.id===servId);
    const m=estado.mascotas[estado.vetSel];
    if(!sv||!m) return;
    if(m[sv.stat]>=100){ return; }
    if(estado.efectivo<sv.costo){ sError(); flash(`Ese cuidado cuesta ${plata(sv.costo)} y no te alcanza 😅. ¡Pasá por el cajero! 🏧`); return; }

    estado.vetOcupada=true;
    estado.efectivo-=sv.costo;
    m[sv.stat]=100;
    // pequeño rebote del bicho + efecto del servicio
    const pet=document.getElementById("petEmoji");
    const fx=document.getElementById("vetFx");
    if(pet){ pet.classList.add("trabajando"); }
    lanzarFx(fx, servId);
    if(servId==="banar") sMoneda(); else if(servId==="cortar") sTecla(); else if(servId==="curar") sOk(); else sMoneda();

    setTimeout(()=>{
      estado.vetOcupada=false;
      sFiesta();
      const todoOk=estadoMascota(m).ok;
      if(todoOk){ confetti(); estado.monedas++; estado.efectivo+=5; }
      guardar();
      renderVet();
      // mensajito de resultado
      flash(`✅ ${m.nombre} quedó ${sv.efecto}`);
      if(todoOk) setTimeout(()=>flash(`🏆 ¡${m.nombre} está perfecto! +1 🪙`),1200);
    }, 1500);
  }

  function lanzarFx(fx, servId){
    if(!fx) return;
    fx.innerHTML="";
    const conf = {
      banar:{em:["🫧","💧","🫧","🛁","💦","🫧"], cls:"fx-sube"},
      cortar:{em:["✂️","💇","✂️","💈","✂️"], cls:"fx-corte"},
      curar:{em:["💉","✨","❤️‍🩹","✨","💊","✨"], cls:"fx-sube"},
      comer:{em:["🍖","😋","🦴","❤️","🍖"], cls:"fx-sube"},
    }[servId] || {em:["✨"],cls:"fx-sube"};
    conf.em.forEach((e,i)=>{
      const s=document.createElement("span");
      s.className="fxitem "+conf.cls; s.textContent=e;
      s.style.left=(15+Math.random()*70)+"%";
      s.style.animationDelay=(i*0.12)+"s";
      fx.appendChild(s);
    });
    setTimeout(()=>{ if(fx) fx.innerHTML=""; }, 1600);
  }

  /* ---------- flash de aviso ---------- */
  let flashT=null;
  function flash(txt){
    let g=document.getElementById("flashG");
    if(!g){g=document.createElement("div");g.id="flashG";g.className="globo tiembla";
      g.style.position="absolute";g.style.left="12px";g.style.right="12px";g.style.bottom="84px";g.style.zIndex=50;
      $app().appendChild(g);}
    g.innerHTML=txt; clearTimeout(flashT); flashT=setTimeout(()=>{if(g)g.remove();},2500);
  }

  /* ---------- Arranque ---------- */
  window.addEventListener("DOMContentLoaded",()=>{ cargar(); render(); });
  </script>
</body>
</html>
