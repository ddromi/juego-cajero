<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7ec8ff" />
  <title>🏙️ Mi Ciudad — Cajero & Shopping</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏙️</text></svg>" />
  <style>
  :root{
    --azul:#2a6df4; --azul-osc:#1b4bb0; --verde:#25b85f; --verde-osc:#1c9149;
    --rojo:#e8453c; --amarillo:#ffce00; --gris:#eef2f8; --texto:#1f2a44;
    --radio:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:"Comic Sans MS","Trebuchet MS","Segoe UI",system-ui,sans-serif;
    color:var(--texto);background:#bfe3ff;overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }
  #app{position:fixed;inset:0;}

  /* ---------- Botones genéricos ---------- */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    border:none;border-radius:var(--radio);padding:16px;font-size:19px;font-weight:800;
    font-family:inherit;color:#fff;background:var(--azul);box-shadow:0 6px 0 rgba(0,0,0,.18);
    cursor:pointer;margin:8px 0;transition:transform .05s;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .btn.verde{background:var(--verde);}
  .btn.rojo{background:var(--rojo);}
  .btn.amarillo{background:var(--amarillo);color:var(--texto);}
  .btn.gris{background:#c4cee0;color:var(--texto);}
  .btn:disabled{filter:grayscale(.6) opacity(.6);}
  .btn .emoji{font-size:24px;}

  /* ---------- HUD plata ---------- */
  .hud{position:absolute;top:8px;left:8px;right:58px;display:flex;gap:8px;z-index:30;pointer-events:none;}
  .hud .chip{flex:1;background:rgba(255,255,255,.92);border-radius:14px;padding:6px 8px;
    text-align:center;box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .hud .et{font-size:11px;opacity:.7;}
  .hud .mo{font-size:17px;font-weight:800;}
  .hud .banco .mo{color:var(--azul-osc);} .hud .efe .mo{color:var(--verde-osc);}
  .hud .mon .mo{color:#c98a00;}

  /* botón sonido */
  .sonido-btn{position:absolute;top:8px;right:8px;border:none;background:rgba(255,255,255,.92);
    border-radius:50%;width:42px;height:42px;font-size:18px;box-shadow:0 3px 0 rgba(0,0,0,.12);
    cursor:pointer;z-index:40;}

  /* =====================================================================
     PERSONAJE PRO (ilustrado en SVG, estilo Avatar World, camina de verdad)
     ===================================================================== */
  .person{display:inline-block;vertical-align:bottom;overflow:visible;line-height:0;}
  .person .a-leg,.person .a-arm{transform-box:fill-box;transform-origin:50% 6%;}
  .person .p-headg{transform-box:fill-box;transform-origin:50% 100%;}
  @keyframes swingA{0%,100%{transform:rotate(17deg);}50%{transform:rotate(-17deg);}}
  @keyframes swingB{0%,100%{transform:rotate(-17deg);}50%{transform:rotate(17deg);}}
  .person.walk .a-arm-l,.person.walk .a-leg-r{animation:swingA .42s ease-in-out infinite;}
  .person.walk .a-arm-r,.person.walk .a-leg-l{animation:swingB .42s ease-in-out infinite;}
  .person.walk .p-bodyg{animation:bodyBob .42s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%;}
  @keyframes bodyBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-2.5px);}}
  @keyframes headBob{0%,100%{transform:rotate(-2.2deg);}50%{transform:rotate(2.2deg);}}
  .person:not(.walk) .p-headg{animation:headBob 2.8s ease-in-out infinite;}
  @keyframes blink{0%,94%,100%{transform:scaleY(1);}97%{transform:scaleY(.1);}}
  .person .p-eyes{transform-box:fill-box;transform-origin:50% 50%;animation:blink 4.6s ease-in-out infinite;}
  .person.izq{transform:scaleX(-1);}
  /* sentado (food court): piernas hacia adelante */
  .person.sit .a-leg{transform:rotate(82deg);}

  /* =====================================================================
     AUTO PRO (dibujado con CSS, más grande)
     ===================================================================== */
  .car{position:relative;width:calc(108px*var(--cs,1));height:calc(50px*var(--cs,1));}
  .car .c-body{position:absolute;bottom:calc(9px*var(--cs,1));left:0;right:0;
    height:calc(24px*var(--cs,1));background:var(--c);border-radius:12px 16px 7px 7px;
    box-shadow:inset 0 calc(-6px*var(--cs,1)) rgba(0,0,0,.16),0 calc(4px*var(--cs,1)) 0 rgba(0,0,0,.18);}
  .car .c-cabin{position:absolute;top:calc(2px*var(--cs,1));left:24%;width:50%;
    height:calc(22px*var(--cs,1));background:var(--c);border-radius:12px 12px 0 0;
    box-shadow:inset 0 calc(4px*var(--cs,1)) rgba(255,255,255,.18);}
  .car .c-win{position:absolute;top:calc(5px*var(--cs,1));left:28%;width:42%;
    height:calc(15px*var(--cs,1));background:linear-gradient(160deg,#dff3ff,#a9d8ff);
    border-radius:8px;border:calc(2px*var(--cs,1)) solid rgba(0,0,0,.15);}
  .car .c-light{position:absolute;bottom:calc(16px*var(--cs,1));right:calc(2px*var(--cs,1));
    width:calc(7px*var(--cs,1));height:calc(7px*var(--cs,1));background:#fff3a0;border-radius:50%;
    box-shadow:0 0 calc(6px*var(--cs,1)) #ffe14a;}
  .car .wheel{position:absolute;bottom:0;width:calc(20px*var(--cs,1));height:calc(20px*var(--cs,1));
    background:#1b1f24;border-radius:50%;border:calc(5px*var(--cs,1)) solid #6a727c;}
  .car .wheel.f{right:calc(13px*var(--cs,1));} .car .wheel.b{left:calc(13px*var(--cs,1));}

  /* ---------- Pantalla elegir avatar ---------- */
  .pick{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:flex-start;gap:12px;padding:24px 18px;overflow-y:auto;
    background:linear-gradient(160deg,#aee0ff,#d6f3ff 50%,#fff3c4);}
  .pick h1{font-size:28px;margin:6px 0 0;text-align:center;}
  .pick p{margin:0;opacity:.78;text-align:center;}
  .chars{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:380px;width:100%;}
  .char{background:#fff;border:3px solid transparent;border-radius:16px;padding:8px 0 4px;
    text-align:center;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.1);}
  .char .cn{font-size:11px;font-weight:800;opacity:.7;}
  .char.sel{border-color:var(--azul);transform:scale(1.05);background:#eaf3ff;}
  .pick input{font-family:inherit;font-size:18px;padding:12px 14px;border-radius:14px;
    border:2px solid #cdd8ea;width:100%;max-width:380px;text-align:center;}
  .pick .btn{max-width:380px;}
  .toggle-vuelto{max-width:380px;width:100%;background:#fff;border-radius:16px;padding:12px 14px;
    box-shadow:0 4px 0 rgba(0,0,0,.1);display:flex;align-items:center;gap:10px;cursor:pointer;}
  .toggle-vuelto .tv-txt{flex:1;text-align:left;font-size:14px;line-height:1.2;}
  .toggle-vuelto .tv-txt b{font-size:15px;}
  .sw{width:54px;height:30px;border-radius:999px;background:#c4cee0;position:relative;flex:0 0 auto;
    transition:background .15s;}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;
    background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.2);transition:left .15s;}
  .sw.on{background:var(--verde);} .sw.on::after{left:27px;}

  /* ---------- Ómnibus ---------- */
  .bus{position:relative;width:178px;height:78px;}
  .bus .bus-body{position:absolute;bottom:12px;left:0;right:0;height:52px;border-radius:16px 20px 8px 8px;
    background:linear-gradient(#ffd23f,#f2a900);box-shadow:inset 0 -8px rgba(0,0,0,.16),0 5px 0 rgba(0,0,0,.2);}
  .bus .bus-stripe{position:absolute;bottom:28px;left:0;right:0;height:6px;background:#e23b3b;}
  .bus .bus-win{position:absolute;top:18px;width:26px;height:17px;border-radius:4px;
    background:linear-gradient(#e6f6ff,#a9d8ff);border:2px solid rgba(0,0,0,.12);}
  .bus .bus-door{position:absolute;bottom:14px;right:14px;width:22px;height:38px;border-radius:5px;
    background:linear-gradient(#bfe9ff,#7fc6ff);border:2px solid rgba(0,0,0,.18);}
  .bus .wheel{position:absolute;bottom:0;width:22px;height:22px;border-radius:50%;background:#1b1f24;border:5px solid #6a727c;}
  .bus .wheel.f{right:26px;} .bus .wheel.b{left:26px;}
  .bus .bus-label{position:absolute;top:-4px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;
    color:#7a4b00;background:#fff;border-radius:8px;padding:1px 7px;white-space:nowrap;box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .parada{position:absolute;bottom:32%;transform:translateX(-50%);cursor:pointer;text-align:center;z-index:14;}
  .parada .poste{width:7px;height:46px;background:#9aa7bd;margin:0 auto;border-radius:4px;}
  .parada .señal{background:#1c6fd6;color:#fff;border-radius:10px;padding:4px 9px;font-size:12px;font-weight:800;
    box-shadow:0 3px 0 rgba(0,0,0,.2);white-space:nowrap;}
  .parada .toque{top:-30px;}
  /* transición de viaje en bus */
  .viaje{position:fixed;inset:0;background:linear-gradient(#8fd3ff,#cdeeff);z-index:90;overflow:hidden;
    display:flex;align-items:flex-end;justify-content:center;}
  .viaje .ruta{position:absolute;bottom:24%;left:0;right:0;height:8px;background:repeating-linear-gradient(90deg,#ffd54a 0 30px,transparent 30px 60px);}
  .viaje .busbig{position:absolute;bottom:26%;left:50%;transform:translateX(-50%) scale(1.6);animation:busVibra .3s ease-in-out infinite;}
  @keyframes busVibra{0%,100%{transform:translateX(-50%) scale(1.6) translateY(0);}50%{transform:translateX(-50%) scale(1.6) translateY(-3px);}}
  .viaje .vtxt{position:absolute;top:34%;left:0;right:0;text-align:center;font-size:22px;font-weight:800;color:#1b4bb0;}
  .viaje .paisaje{position:absolute;bottom:31%;font-size:34px;animation:pasaPaisaje 1.1s linear infinite;}
  @keyframes pasaPaisaje{from{left:110%;}to{left:-10%;}}

  /* ---------- Parque ---------- */
  .parque{position:absolute;inset:0;overflow:hidden;
    background:linear-gradient(#8fd3ff 0%,#bfe6ff 42%,#cdeeff 52%,#bfe9a8 52%,#9fd97e 100%);}
  .parque .pasto{position:absolute;left:0;right:0;bottom:0;height:48%;
    background:linear-gradient(#aee48a,#86c95f);}
  .parque .pasto::after{content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(90deg,transparent 0 40px,rgba(0,0,0,.04) 40px 42px);}
  .parque .camino{position:absolute;left:0;right:0;bottom:0;height:16%;background:#d8c9a8;
    border-top:4px solid #c3b491;}
  .parque .pdeco{position:absolute;transform:translateX(-50%);line-height:1;cursor:pointer;}
  .parque .pdeco.fija{cursor:default;}
  .parque .estanque{position:absolute;bottom:18%;transform:translateX(-50%);width:130px;height:44px;
    background:radial-gradient(circle at 50% 40%,#bfe9ff,#6fc0f0);border-radius:50%;
    box-shadow:inset 0 4px 8px rgba(0,0,0,.15);}

  /* ---------- Ciudad ---------- */
  .ciudad{position:absolute;inset:0;overflow:hidden;
    background:linear-gradient(#8fd3ff 0%,#bfe6ff 45%,#e9f7ff 60%);}
  .sol{position:absolute;top:6%;right:14%;font-size:54px;animation:girar 18s linear infinite;}
  @keyframes girar{to{transform:rotate(360deg);}}
  .nube{position:absolute;font-size:46px;opacity:.95;animation:nubeAnda linear infinite;}
  @keyframes nubeAnda{from{transform:translateX(-22vw);}to{transform:translateX(120vw);}}

  .vereda{position:absolute;left:0;right:0;bottom:18%;height:14%;background:#cfd6df;
    border-top:4px solid #b9c1cc;}
  .vereda::after{content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(90deg,transparent 0 46px,#b9c1cc 46px 50px);opacity:.6;}
  .calle{position:absolute;left:0;right:0;bottom:0;height:18%;background:#4a5560;}
  .calle::before{content:"";position:absolute;top:50%;left:0;right:0;height:5px;transform:translateY(-50%);
    background-image:repeating-linear-gradient(90deg,#ffd54a 0 34px,transparent 34px 66px);}

  .edificio{position:absolute;bottom:32%;transform:translateX(-50%);cursor:pointer;text-align:center;}
  .edificio .cuerpo{width:128px;height:138px;border-radius:12px 12px 6px 6px;position:relative;
    box-shadow:0 8px 0 rgba(0,0,0,.15);display:flex;align-items:flex-end;justify-content:center;}
  .edificio .techo{position:absolute;top:-16px;left:-8px;right:-8px;height:20px;border-radius:8px;}
  .edificio .puerta{width:44px;height:58px;background:linear-gradient(#5a4636,#3a2a1e);border-radius:8px 8px 0 0;
    border:3px solid rgba(0,0,0,.2);}
  .edificio .ventana{position:absolute;width:24px;height:24px;background:#bfe9ff;border-radius:4px;
    border:2px solid rgba(255,255,255,.6);}
  .edificio .cartel{position:absolute;top:-46px;left:50%;transform:translateX(-50%);white-space:nowrap;
    background:#fff;border-radius:12px;padding:4px 12px;font-size:14px;font-weight:800;
    box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .edificio .cartel .ico{font-size:18px;}
  .edificio:active{transform:translateX(-50%) scale(.97);}
  .toque{position:absolute;top:-70px;left:50%;transform:translateX(-50%);font-size:12px;
    background:var(--amarillo);border-radius:10px;padding:2px 8px;font-weight:800;
    animation:flota 1.4s ease-in-out infinite;}
  @keyframes flota{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-5px);}}

  .deco{position:absolute;transform:translateX(-50%);font-size:34px;cursor:pointer;line-height:1;}
  .deco.fija{cursor:default;}
  .auto-cap{position:absolute;animation:cruza linear infinite;z-index:6;}
  @keyframes cruza{from{left:-160px;}to{left:108%;}}
  .moneda{position:absolute;transform:translateX(-50%);cursor:pointer;z-index:15;
    animation:brilla 1s ease-in-out infinite;}
  @keyframes brilla{0%,100%{transform:translateX(-50%) translateY(0) scale(1);}50%{transform:translateX(-50%) translateY(-6px) scale(1.12);}}
  /* moneda dorada de verdad */
  .coin{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;
    font-weight:900;color:#9a6800;vertical-align:middle;
    background:radial-gradient(circle at 35% 28%,#fff6c0,#ffd84d 42%,#f0b000 70%,#bd7d00);
    box-shadow:0 0 7px rgba(255,200,40,.8), inset 0 -3px 4px rgba(140,90,0,.55), inset 0 2px 4px rgba(255,255,255,.7);
    border:2px solid #e0a400;text-shadow:0 1px 0 rgba(255,255,255,.4);}
  @keyframes giraCoin{0%{transform:rotateY(0);}50%{transform:rotateY(180deg);}100%{transform:rotateY(360deg);}}
  .moneda .coin{animation:giraCoin 2.6s linear infinite;}

  .npc{position:absolute;bottom:24%;transform:translateX(-50%);z-index:14;}
  .avatar{position:absolute;bottom:24%;transform:translateX(-50%);z-index:20;
    transition:left .25s linear;will-change:left;}
  .burbuja{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#fff;
    border-radius:12px;padding:4px 10px;font-size:14px;font-weight:700;white-space:nowrap;
    box-shadow:0 3px 0 rgba(0,0,0,.12);z-index:30;}
  .pista-piso{position:absolute;bottom:1%;left:0;right:0;text-align:center;font-size:12px;
    color:#fff;text-shadow:0 1px 2px #000;}

  /* ---------- Paneles interiores ---------- */
  .vista{position:absolute;inset:0;display:flex;flex-direction:column;padding:12px;
    max-width:560px;margin:0 auto;}
  .cabecera{display:flex;align-items:center;gap:10px;margin:34px 0 10px;}
  .cabecera .volver{border:none;background:#fff;border-radius:12px;padding:9px 13px;font-size:18px;
    font-weight:800;font-family:inherit;box-shadow:0 4px 0 rgba(0,0,0,.1);cursor:pointer;}
  .cabecera h2{margin:0;font-size:20px;flex:1;}
  .panel{background:#fff;border-radius:var(--radio);padding:16px;box-shadow:0 6px 0 rgba(0,0,0,.08);}
  .globo{background:#fff8d6;border:3px dashed var(--amarillo);border-radius:16px;padding:12px;
    text-align:center;font-size:16px;margin:10px 0;}
  .titulo{text-align:center;font-size:24px;font-weight:800;margin:6px 0 14px;}

  /* ---------- Cajero ---------- */
  .cajero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#3a4a5e,#243443);}
  .atm{position:relative;width:240px;margin:6px auto 0;background:#dfe6ee;border-radius:18px;
    padding:14px;box-shadow:0 10px 0 #9aa7b5, inset 0 2px 6px #fff;}
  .atm .marca{text-align:center;font-weight:800;color:#345;letter-spacing:1px;margin-bottom:8px;}
  .atm .screen{background:#0b2a4a;color:#cde9ff;border-radius:10px;padding:14px;min-height:84px;
    text-align:center;font-size:16px;display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 0 16px rgba(0,0,0,.6);}
  .atm .slot{margin:12px auto 4px;width:120px;height:14px;background:#222;border-radius:7px;
    box-shadow:inset 0 2px 4px #000;position:relative;}
  .atm .slot::after{content:"INSERTÁ AQUÍ";position:absolute;top:16px;left:0;right:0;text-align:center;
    font-size:9px;color:#345;font-weight:800;}
  .atm .luces{display:flex;justify-content:center;gap:6px;margin-top:14px;}
  .atm .luces i{width:8px;height:8px;border-radius:50%;background:#7bd88f;display:block;
    animation:parpadeo 1.2s infinite;}
  .atm .luces i:nth-child(2){animation-delay:.4s;background:#ffd54a;}
  .atm .luces i:nth-child(3){animation-delay:.8s;background:#7fb6ff;}
  @keyframes parpadeo{50%{opacity:.3;}}

  .tarjeta{position:absolute;left:50%;width:96px;height:60px;border-radius:8px;
    background:linear-gradient(135deg,#ffb347,#ff7e5f);box-shadow:0 6px 12px rgba(0,0,0,.4);
    transform:translateX(-50%);z-index:5;}
  .tarjeta .chip{position:absolute;top:10px;left:10px;width:16px;height:12px;border-radius:3px;
    background:linear-gradient(#ffe082,#c9a227);}
  .tarjeta .raya{position:absolute;bottom:10px;left:8px;right:8px;height:6px;background:rgba(255,255,255,.6);border-radius:3px;}
  .tarjeta .marca{position:absolute;top:8px;right:10px;font-size:9px;font-weight:800;color:#fff;}
  .tarjeta.insertando{animation:insertar 1.1s forwards;}
  .tarjeta.saliendo{animation:expulsar 1.1s forwards;}
  @keyframes insertar{
    0%{top:78%;opacity:1;transform:translateX(-50%) scale(1);}
    70%{top:30%;opacity:1;transform:translateX(-50%) scale(.9);}
    100%{top:24%;opacity:0;transform:translateX(-50%) scale(.55);}
  }
  @keyframes expulsar{
    0%{top:24%;opacity:0;transform:translateX(-50%) scale(.55);}
    30%{top:30%;opacity:1;transform:translateX(-50%) scale(.9);}
    100%{top:78%;opacity:1;transform:translateX(-50%) scale(1);}
  }
  .mano{position:absolute;left:50%;transform:translateX(-50%);bottom:8%;font-size:40px;}

  .pin-display{letter-spacing:12px;font-size:34px;text-align:center;margin:8px 0;min-height:40px;
    color:var(--azul-osc);font-weight:800;}
  .teclado{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .tecla{border:none;border-radius:12px;padding:16px;font-size:24px;font-weight:800;font-family:inherit;
    background:var(--gris);color:var(--texto);box-shadow:0 4px 0 rgba(0,0,0,.12);cursor:pointer;}
  .tecla:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.12);}
  .tecla.ok{background:var(--verde);color:#fff;} .tecla.borrar{background:var(--amarillo);}

  /* =====================================================================
     MALL INTERIOR (mundo que se recorre caminando)
     ===================================================================== */
  .mall-scene{position:absolute;inset:0;overflow:hidden;background:#2b3550;}
  .mall-world{position:absolute;top:0;bottom:0;left:0;will-change:transform;
    transition:transform .4s linear;}
  /* techo con luces */
  .m-techo{position:absolute;top:0;left:0;right:0;height:11%;
    background:linear-gradient(#e8eef7,#cdd7e6);border-bottom:5px solid #b7c2d4;}
  .m-techo .luz{position:absolute;top:38%;width:46px;height:12px;border-radius:8px;
    background:#fff7c4;box-shadow:0 0 18px #ffe98a;}
  /* segundo piso con baranda */
  .m-piso2{position:absolute;top:11%;left:0;right:0;height:16%;
    background:linear-gradient(#dfe7f2,#cbd5e6);border-bottom:6px solid #aab6c9;}
  .m-baranda{position:absolute;bottom:0;left:0;right:0;height:46px;
    border-top:4px solid #9aa7bd;
    background:repeating-linear-gradient(90deg,rgba(150,170,200,.35) 0 4px,transparent 4px 26px);}
  /* pared media */
  .m-pared{position:absolute;top:27%;left:0;right:0;bottom:24%;
    background:linear-gradient(#f3f6fb,#e6ecf5);}
  /* piso */
  .m-piso{position:absolute;left:0;right:0;bottom:0;height:24%;
    background:linear-gradient(#d7deea,#c3cdde);
    border-top:4px solid #b3bdd0;}
  .m-piso::after{content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(90deg,transparent 0 56px,rgba(120,135,160,.25) 56px 60px),
      repeating-linear-gradient(0deg,transparent 0 30px,rgba(120,135,160,.18) 30px 32px);}
  .m-tap{position:absolute;left:0;right:0;bottom:0;top:11%;z-index:1;cursor:pointer;}

  .escalera[data-subir],.escalera[data-bajar],.m-cartel[data-subir],.m-cartel[data-bajar]{pointer-events:auto;}
  .m-cartel.m-subir{background:#fff3c4;border:2px solid #ffce00;animation:flota 1.6s ease-in-out infinite;}
  .escalera.baja .rampa{clip-path:polygon(0 0,28% 0,100% 100%,0 100%);}

  .mall-scene.alta{background:#3a2f55;}
  .mall-scene.alta .m-pared{background:linear-gradient(#f6f1ff,#ece4fb);}

  /* local / vidriera */
  .local{position:absolute;bottom:24%;transform:translateX(-50%);width:210px;cursor:pointer;z-index:4;}
  .local .toldo{position:relative;height:26px;border-radius:8px 8px 0 0;overflow:hidden;

  .local .toldo::after{content:"";position:absolute;inset:0;

    box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .local .vidriera{height:118px;background:linear-gradient(160deg,#e9f6ff,#bfe2ff);
    border:5px solid #fff;border-top:none;border-radius:0 0 10px 10px;position:relative;
    display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;padding:8px;
    box-shadow:inset 0 0 22px rgba(0,80,160,.12);}
  .local .vidriera span{font-size:30px;}
  .local .puerta-l{position:absolute;bottom:0;left:50%;transform:translateX(-50%);

  .local .entrar{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);white-space:nowrap;

  .local:active{transform:translateX(-50%) scale(.98);}

  /* escalera mecánica */
  .escalera{position:absolute;bottom:24%;transform:translateX(-50%);width:120px;height:150px;z-index:3;}
  .escalera .rampa{position:absolute;inset:0;background:repeating-linear-gradient(48deg,#9aa7bd 0 14px,#ccd6e6 14px 28px);

    box-shadow:0 5px 0 rgba(0,0,0,.12);}
  .escalera .paso{position:absolute;width:14px;height:8px;background:#7f8ca3;border-radius:2px;
    animation:subir 1.6s linear infinite;}

    to{transform:translate(74px,-110px);opacity:0;}}
  .escalera .baranda{position:absolute;width:6px;height:170px;background:#6c7894;border-radius:4px;
    bottom:0;left:8px;transform:rotate(34deg);transform-origin:bottom;}

  .m-prop{position:absolute;bottom:24%;transform:translateX(-50%);font-size:40px;z-index:3;line-height:1;}
  .m-mesa{position:absolute;bottom:24%;transform:translateX(-50%);z-index:4;text-align:center;}
  .m-mesa .tabla{font-size:38px;}
  .m-cartel{position:absolute;transform:translateX(-50%);background:#fff;border-radius:12px;

    white-space:nowrap;}
  .m-npc{position:absolute;bottom:24%;transform:translateX(-50%);z-index:5;}
  .m-npc.wander{animation:vagar 7s ease-in-out infinite alternate;}

  .m-avatar{position:absolute;bottom:24%;transform:translateX(-50%);z-index:9;
    transition:left .4s linear;will-change:left;}

  .mall-ayuda{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:13px;

    padding:0 12px;z-index:20;pointer-events:none;}
  .mall-flechas button{pointer-events:auto;border:none;width:60px;height:60px;border-radius:50%;
    font-size:28px;background:rgba(255,255,255,.92);box-shadow:0 4px 0 rgba(0,0,0,.2);cursor:pointer;}

  /* ---------- Catálogo de tienda ---------- */
  .tienda-bg{position:absolute;inset:0;background:linear-gradient(160deg,#eef4ff,#fff);}
  .productos{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;overflow-y:auto;padding-bottom:96px;}
  .producto{background:#fff;border-radius:16px;padding:12px 8px;text-align:center;
    box-shadow:0 5px 0 rgba(0,0,0,.08);cursor:pointer;position:relative;}
  .producto:active{transform:scale(.96);}
  .producto.no-alcanza{filter:grayscale(.7);opacity:.55;}

  .producto .pprecio{color:var(--verde-osc);font-weight:800;font-size:16px;}
  .producto .badge{position:absolute;top:-8px;right:-8px;background:var(--rojo);color:#fff;border-radius:999px;
    min-width:26px;height:26px;font-size:14px;font-weight:800;display:flex;align-items:center;
    justify-content:center;padding:0 6px;}
  .carrito-barra{position:absolute;left:12px;right:12px;bottom:12px;background:var(--verde);color:#fff;
    border-radius:var(--radio);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 6px 14px rgba(0,0,0,.2);font-weight:800;font-size:17px;cursor:pointer;}

  /* ---------- Vuelto (calcular el cambio) ---------- */
  .vuelto-bg{position:absolute;inset:0;background:linear-gradient(160deg,#fff3c4,#ffe7f0);}
  .recibo{background:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 6px 0 rgba(0,0,0,.08);
    font-size:17px;line-height:1.6;}
  .recibo .fila{display:flex;justify-content:space-between;}
  .recibo .total{border-top:2px dashed #cdd8ea;margin-top:6px;padding-top:6px;font-weight:800;}
  .opciones-vuelto{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px;}
  .ov{border:none;border-radius:16px;padding:22px 8px;font-size:26px;font-weight:800;font-family:inherit;
    background:#fff;color:var(--azul-osc);box-shadow:0 6px 0 rgba(0,0,0,.12);cursor:pointer;
    border:3px solid #dbe5f5;}
  .ov:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
  .ov.mal{background:#ffe1de;border-color:var(--rojo);animation:shake .3s;}
  .ov.bien{background:#d8f8e4;border-color:var(--verde);}

  /* ---------- Veterinaria / Salud Animal ---------- */
  .vet-bg{position:absolute;inset:0;background:linear-gradient(160deg,#d6fff2,#eafff8 55%,#e8f4ff);}
  .vet-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:4px;}
  .vtab{flex:0 0 auto;border:none;border-radius:999px;padding:9px 14px;font-size:14px;font-weight:800;
    font-family:inherit;background:#fff;color:var(--texto);box-shadow:0 3px 0 rgba(0,0,0,.08);cursor:pointer;}
  .vtab.activa{background:#2bbf9a;color:#fff;}
  .vet-room{position:relative;height:200px;border-radius:18px;margin:4px 0 12px;overflow:hidden;

    box-shadow:inset 0 0 22px rgba(0,90,120,.12);}
  .vet-room::before{content:"🧴 🧼 🧻 💊 🩺";position:absolute;top:8px;left:10px;font-size:18px;opacity:.7;letter-spacing:6px;}
  .vet-room::after{content:"🐾";position:absolute;top:8px;right:12px;font-size:22px;opacity:.5;}
  .vet-mesa{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:78%;height:42px;
    background:linear-gradient(#dfe8ef,#b9c6d2);border-radius:12px 12px 0 0;border:3px solid #fff;

  .vet-pet{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);text-align:center;z-index:2;}

  @keyframes petIdle{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-6px) rotate(1deg);}}
  .pet-emoji.sucio{filter:drop-shadow(0 6px 6px rgba(0,0,0,.25)) sepia(.6) brightness(.85) contrast(1.05);}
  .pet-emoji.peludo{filter:drop-shadow(0 6px 6px rgba(0,0,0,.25)) blur(.4px) contrast(.95);transform:scale(1.06);}
  .pet-emoji.trabajando{animation:petJump .5s ease-in-out 2;}
  @keyframes petJump{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-16px) scale(1.08);}}
  .pet-cara{position:absolute;top:-6px;right:-14px;font-size:30px;}
  .pet-bandage{position:absolute;top:24px;left:-12px;font-size:26px;transform:rotate(-18deg);}
  .pet-nombre{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:14px;
    color:#0d4a3e;z-index:3;text-shadow:0 1px 2px #fff;cursor:pointer;}
  .vet-fx{position:absolute;inset:-40px 0 0 0;pointer-events:none;z-index:4;}
  .fxitem{position:absolute;bottom:40px;font-size:30px;opacity:0;}
  .fx-sube{animation:fxSube 1.3s ease-out forwards;}
  @keyframes fxSube{0%{opacity:0;transform:translateY(10px) scale(.6);}
    20%{opacity:1;}100%{opacity:0;transform:translateY(-120px) scale(1.2) rotate(20deg);}}
  .fx-corte{animation:fxCorte 1.2s ease-in-out forwards;}
  @keyframes fxCorte{0%{opacity:0;transform:translateX(-30px) scale(.7);}
    25%{opacity:1;}60%{transform:translateX(30px) scale(1.1);}100%{opacity:0;transform:translateX(60px) scale(.8);}}
  .vet-stat{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:13px;font-weight:700;}
  .vet-stat .vs-lbl{flex:0 0 96px;}
  .vet-stat .vs-bar{flex:1;height:16px;background:#e7edf5;border-radius:9px;overflow:hidden;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.15);}
  .vet-stat .vs-fill{height:100%;border-radius:9px;transition:width .5s ease;}
  .vet-stat .vs-num{flex:0 0 40px;text-align:right;}
  .vet-servicios{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px;}
  .vet-serv{border:none;border-radius:16px;padding:12px 6px;font-family:inherit;cursor:pointer;
    background:#fff;box-shadow:0 5px 0 rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;gap:2px;
    border:3px solid #d3ece4;}
  .vet-serv:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.1);}
  .vet-serv .vse{font-size:30px;} .vet-serv .vsn{font-weight:800;font-size:14px;}
  .vet-serv .vsc{font-size:13px;font-weight:800;color:var(--verde-osc);}
  .vet-serv.hecho{filter:grayscale(.5);opacity:.6;} .vet-serv.hecho .vsc{color:#888;}
  .pet-acc-vet{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:40px;z-index:3;}
  /* nivel de felicidad + accesorios */
  .vet-nivel{display:flex;align-items:center;gap:8px;margin:10px 0 2px;font-size:13px;font-weight:800;}
  .vet-nivel .vn-lbl{flex:0 0 96px;color:#b97e00;}
  .vet-acc-tit{font-weight:800;margin:12px 0 6px;font-size:14px;}
  .vet-accs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
  .vet-acc{flex:0 0 auto;border:none;border-radius:14px;padding:8px 6px;width:74px;font-family:inherit;cursor:pointer;
    background:#fff;box-shadow:0 4px 0 rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;gap:2px;
    border:3px solid #e3ece4;}
  .vet-acc .vae{font-size:26px;} .vet-acc .van{font-size:11px;font-weight:800;}
  .vet-acc.eq{border-color:#2bbf9a;background:#e3fff5;}
  .vet-acc.lock{filter:grayscale(.6);opacity:.7;cursor:not-allowed;} .vet-acc.lock .van{color:#999;}

  /* ---------- Mini-juego de baño ---------- */
  .bano-tina{position:relative;height:200px;border-radius:18px;margin:6px 0;overflow:hidden;cursor:grab;
    background:linear-gradient(#cdeffe 0%,#a8defc 55%,#7cc6f5 100%);touch-action:none;

  .bano-pet{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-size:96px;line-height:1;

  .mascota-ciudad{position:absolute;bottom:22%;transform:translateX(-50%);font-size:34px;z-index:18;

  @keyframes petTrot{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-5px);}}
  .pet-think{position:absolute;bottom:96%;left:50%;transform:translateX(-50%);background:#fff;
    border-radius:12px;padding:1px 7px;font-size:15px;box-shadow:0 2px 0 rgba(0,0,0,.12);white-space:nowrap;

  .pet-acc-city{position:absolute;bottom:78%;left:50%;transform:translateX(-50%);font-size:20px;line-height:1;}

  .cobro-ops{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0;}

    display:flex;flex-direction:column;align-items:center;gap:2px;color:#fff;font-weight:800;

  .cobro:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .cobro .cv-e{font-size:28px;} .cobro small{font-size:10px;font-weight:700;opacity:.95;}
  .cobro.qr{background:#1c6fd6;} .cobro.tar{background:#7a5cff;} .cobro.efe{background:#25b85f;}

  /* ---------- Álbum de mascotas ---------- */
  .alb-lista{display:flex;flex-direction:column;gap:8px;margin:6px 0 12px;max-height:46vh;overflow-y:auto;}
  .alb-fila{display:flex;align-items:center;gap:12px;background:#f3f6fb;border-radius:12px;padding:8px 12px;}
  .alb-emoji{font-size:40px;position:relative;line-height:1;}
  .alb-emoji small{position:absolute;top:-6px;right:-8px;font-size:18px;}
  .alb-info{font-size:14px;line-height:1.3;}

  /* ---------- Botón + modal de la misión (lista de compras) ---------- */
  .mision-btn{position:absolute;border:none;background:#fff;border-radius:14px;padding:7px 9px;
    font-size:20px;box-shadow:0 3px 0 rgba(0,0,0,.14);cursor:pointer;z-index:40;line-height:1;text-align:center;}
  .mision-btn .mb-badge{display:block;font-size:11px;font-weight:800;color:var(--azul-osc);margin-top:1px;}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;
    z-index:80;padding:18px;}
  .modal-card{background:#fff;border-radius:20px;padding:18px;max-width:380px;width:100%;
    box-shadow:0 12px 0 rgba(0,0,0,.22);animation:pop .25s ease-out;}
  .mi-lista{display:flex;flex-direction:column;gap:6px;margin:6px 0;}
  .mi-fila{display:flex;justify-content:space-between;gap:8px;background:#f3f6fb;border-radius:10px;
    padding:8px 10px;font-size:14px;font-weight:700;}
  .mi-fila.ok{background:#dff7e7;}
  .mi-pres{text-align:center;margin-top:8px;font-size:14px;}
  .mi-prog{text-align:center;font-weight:800;margin:4px 0 10px;}

  @keyframes pop{0%{transform:scale(.5);opacity:0;}60%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}
  .celebra{animation:pop .35s ease-out;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
  .tiembla{animation:shake .3s;}
  .conf{position:fixed;top:-20px;font-size:22px;z-index:60;pointer-events:none;animation:caer linear forwards;}
  @keyframes caer{to{transform:translateY(110vh) rotate(540deg);opacity:.2;}}
  </style>
</head>

  function construirTeclado(){
    const t=["1","2","3","4","5","6","7","8","9","borrar","0","ok"];
    const c=document.getElementById("teclado");
    c.innerHTML=t.map(k=>{
      if(k==="borrar")return `<button class="tecla borrar" data-k="borrar">⌫</button>`;
      if(k==="ok")return `<button class="tecla ok" data-k="ok">OK</button>`;
      return `<button class="tecla" data-k="${k}">${k}</button>`;}).join("");
    c.querySelectorAll("[data-k]").forEach(b=>b.onclick=()=>tecla(b.dataset.k));

  function caminarMallA(x, cb){
    const W=estado.mundoW||MALL_W;

    const av=document.getElementById("mavatar");

    const world=document.getElementById("mworld");
    if(!av){ if(cb)cb(); return; }
    if(dist<6){ if(cb)cb(); return; }
    const dur=Math.max(.3, dist/360);
    per.classList.toggle("izq", x<estado.mallX);
    per.classList.add("walk");
    estado.mallX=x;
    av.style.transition=`left ${dur}s linear`;
    if(world) world.style.transition=`transform ${dur}s linear`;
    let n=Math.round(dur/0.2), c=0;
    const tic=setInterval(()=>{sPaso();if(++c>=n)clearInterval(tic);},200);

        <div class="pemoji">${p.emoji}</div><div class="pnombre">${p.nombre}</div>
        <div class="pprecio">${plata(p.precio)}</div></div>`;}).join("");

  function resumenCompraHTML(){
    return Object.entries(estado.carrito).map(([id,c])=>{
      const p=PRODUCTOS.find(x=>x.id===id);
      return `<div class="fila"><span>${p.emoji} ${p.nombre} x${c}</span><span>${plata(p.precio*c)}</span></div>`;
    }).join("");

  function prepararVuelto(){
    const tot=totalCarrito();
    // pagamos con el primer billete que sea MAYOR al total (así siempre hay vuelto)
    let pagaCon = BILLETES.find(b=>b>tot);
    if(!pagaCon){ // total enorme: redondeamos al próximo 500
      pagaCon = Math.ceil((tot+1)/500)*500;
    }
    const correcto = pagaCon - tot;
    // opciones: la correcta + distractores cercanos
    const set=new Set([correcto]);
    const cand=[correcto+5,correcto-5,correcto+10,correcto-10,correcto+20,pagaCon,tot,correcto+50];
    for(const c of cand){ if(set.size>=4)break; if(c>0 && !set.has(c)) set.add(c); }
    let ops=[...set];
    while(ops.length<4){ const r=correcto+ (Math.floor(Math.random()*8)+1)*5; if(!ops.includes(r)&&r>0)ops.push(r); }
    // mezclar
    for(let i=ops.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ops[i],ops[j]]=[ops[j],ops[i]];}
    estado.pago={tot, pagaCon, correcto, ops, errores:0};
  }

    $app().innerHTML=`<div class="vuelto-bg"></div>

  function elegirVuelto(val, btn){
    const pg=estado.pago;
    if(val===pg.correcto){

      setTimeout(()=>finalizarCompra(pg.tot, pg), 450);
    } else {
      sError(); pg.errores++; btn.classList.add("mal"); btn.disabled=true;
      setTimeout(()=>{ btn.classList.remove("mal"); renderVuelto(); }, 600);
    }
  }

  function finalizarCompra(tot, pg){
    sFiesta(); confetti();
    estado.efectivo-=tot;
    const lista=Object.entries(estado.carrito).map(([id,c])=>{const p=PRODUCTOS.find(x=>x.id===id);return `${p.emoji} ${p.nombre} x${c}`;}).join("  ");
    const tienda=estado.tiendaActiva;
    // ¿Adoptamos alguna mascota en esta compra?
    const adoptados=adoptarMascotasDeCarrito();
    // guardamos lo comprado (que no sea mascota) para poder revenderlo en el Mercado

      if(!MASCOTAS_ADOPTABLES[id]) estado.inventario[id]=(estado.inventario[id]||0)+c;
    }
    // ¿Avanzamos / completamos la misión (lista de compras)?
    const misionEstabaPendiente = estado.mision && !estado.mision.completada;
    chequearMision(estado.carrito);
    const misionCumplida = misionEstabaPendiente && estado.mision.completada;
    let misionMsg="";
    if(misionCumplida){
      const dentro = estado.mision.gastado<=estado.mision.presupuesto;
      estado.efectivo+=30; ganarMonedas(3);
      misionMsg=`<div class="globo" style="background:#fff3c4;border-color:#ffce00">
        📋 ¡Lista de compras completa! ${dentro?"Y no te pasaste del presupuesto 👏":""}<br>
        Premio: <b>+$30</b> y <b>+3 🪙</b> (las monedas también son plata 💰) 🎉</div>`;
      nuevaMision(); // arrancá una lista nueva
    }
    estado.carrito={};
    // Premio por calcular bien el vuelto: monedas doradas (que son plata)
    let vueltoMsg="";
    if(pg){
      const premio=2; ganarMonedas(premio);
      vueltoMsg=`<div class="globo">✅ ¡Vuelto correcto!<br>Pagaste con ${plata(pg.pagaCon)} y te dieron <b>${plata(pg.correcto)}</b> de vuelto 💵<br>
        🎁 Premio por calcularlo: <b>+${premio} 🪙</b> = <b>${plata(premio*CONFIG.valorMoneda)}</b> a tu billetera</div>`;
    }
    const adoptaMsg = adoptados.length
      ? `<div class="globo" style="background:#e3fff0;border-color:#5ad0b0">
           🐾 ¡Adoptaste a <b>${adoptados.map(m=>m.emoji+" "+m.nombre).join(", ")}</b>!<br>
           Llevalo a <b>🐾 Salud Animal</b> para bañarlo, cortarle el pelo y curarlo.<br>
           <span style="opacity:.75;font-size:14px">Tip: tocá su nombre en la vet para cambiárselo ✏️</span></div>`
      : "";
    estado.scene="tienda";
    $app().innerHTML=`<div class="tienda-bg"></div>
      <div class="vista"><div class="panel celebra" style="text-align:center;margin-top:40px">
        <div style="font-size:64px">🎉</div><div class="titulo">¡Compraste!</div>
        <div class="globo">${lista}</div>
        ${vueltoMsg}
        ${adoptaMsg}
        ${misionMsg}
        <p>Gastaste <b>${plata(tot)}</b>. Te quedan <b>${plata(estado.efectivo)}</b> 👛</p>
        ${adoptados.length?`<button class="btn" style="background:#2bbf9a" id="avet">🐾 Ir a la veterinaria</button>`:""}
        <button class="btn verde" id="seguir">🛍️ Seguir en esta tienda</button>
        <button class="btn" id="almall">🏬 Volver al shopping</button>
        <button class="btn gris" id="ciudad">🏙️ Salir a la ciudad</button>
      </div></div>`;
    guardar();
    estado.pago=null;
    const avet=document.getElementById("avet");
    if(avet) avet.onclick=()=>{beep(500,.08);estado.vetSel=estado.mascotas.length-1;irA("vet");};
    document.getElementById("seguir").onclick=()=>{beep(500,.08);estado.tiendaActiva=tienda;irA("tienda");};
    document.getElementById("almall").onclick=()=>{beep(500,.08);irA(volverAlMall());};
    document.getElementById("ciudad").onclick=()=>{beep(500,.08);irA("ciudad");};
  }

  // Crea las mascotas (con sus cuidados pendientes) según lo comprado en el carrito
  function adoptarMascotasDeCarrito(){
    const nuevos=[];
    for(const [id,c] of Object.entries(estado.carrito)){
      const def=MASCOTAS_ADOPTABLES[id]; if(!def)continue;
      for(let i=0;i<c;i++){
        const nombre=NOMBRES_MASCOTA[Math.floor(Math.random()*NOMBRES_MASCOTA.length)];
        const m={ id:id, emoji:def.emoji, tipo:def.tipo, peludo:def.peludo, nombre,
          limpieza:35, pelo:def.peludo?30:100, salud:50, animo:45,
          xp:0, accesorio:null, t:Date.now() };
        estado.mascotas.push(m); nuevos.push(m);
      }
    }
    return nuevos;
  }

  function confetti(){
    const em=["🎉","🎊","⭐","💫","🪙","💵","🟡","🔵"];
    for(let i=0;i<26;i++){
      const c=document.createElement("div"); c.className="conf"; c.textContent=em[i%em.length];
      c.style.left=Math.random()*100+"vw";
      c.style.animationDuration=(1.4+Math.random()*1.4)+"s";
      c.style.animationDelay=(Math.random()*.4)+"s";
      document.body.appendChild(c); setTimeout(()=>c.remove(),3000);
    }
  }

  /* =====================================================================
     VETERINARIA / SALUD ANIMAL — cuidar a la mascota adoptada
     ===================================================================== */
  function estadoMascota(m){
    const prom=Math.round((m.limpieza+m.pelo+m.salud+m.animo)/4);
    if(prom>=95) return {cara:"🥰", txt:"¡Está feliz y saludable!", ok:true};
    if(prom>=70) return {cara:"🙂", txt:"Está bastante bien.", ok:false};
    if(prom>=45) return {cara:"😟", txt:"Necesita unos cuidados.", ok:false};
    return {cara:"😢", txt:"¡Necesita ayuda urgente!", ok:false};
  }
  function barra(label, emoji, val, color){
    return `<div class="vet-stat">
      <span class="vs-lbl">${emoji} ${label}</span>
      <div class="vs-bar"><div class="vs-fill" style="width:${val}%;background:${color}"></div></div>
      <span class="vs-num">${val}%</span></div>`;
  }

      cuerpo=`

          <div class="titulo">Veterinaria Salud Animal</div>

        const lleno = m[sv.stat]>=99;

      cuerpo=`

            <div class="pet-cara" id="petCara">${est.cara}</div>
            ${m.salud<50?`<div class="pet-bandage">🩹</div>`:""}

          </div>

          ${barra("Limpieza","🛁",Math.round(m.limpieza),"#34b3ff")}
          ${barra("Pelo","✂️",Math.round(m.pelo),"#a06bff")}

          <div class="vet-acc-tit">🎀 Accesorios <span style="opacity:.6;font-weight:600">— cuidá a ${m.nombre} para subir de nivel</span></div>

    document.getElementById("volver").onclick=()=>{beep(400,.08);irA("mall");};
    const irM=document.getElementById("irMascotas");
    if(irM) irM.onclick=()=>{beep(500,.08);estado.tiendaActiva="Mascotas";estado.carrito={};irA("tienda");};
    const am2=document.getElementById("almall2");
    if(am2) am2.onclick=()=>{beep(400,.08);irA("mall");};

      beep(550,.07); estado.vetSel=parseInt(b.dataset.sel,10); renderVet(); });
    $app().querySelectorAll("[data-serv]").forEach(b=>b.onclick=()=>{

  function equiparAccesorio(accId){
    const m=estado.mascotas[estado.vetSel]; if(!m) return;
    const acc=ACCESORIOS.find(a=>a.id===accId);
    if(!acc || nivelDe(m.xp)<acc.lvl){ sError(); return; }
    m.accesorio = (m.accesorio===accId) ? null : accId;
    beep(m.accesorio?720:420,.08); guardar(); renderVet();
  }

  // suma cariño (XP) y avisa si sube de nivel (desbloquea accesorio)
  function sumarXP(m, pts){
    const antes=nivelDe(m.xp);
    m.xp=(m.xp||0)+pts;
    const ahora=nivelDe(m.xp);
    if(ahora>antes){
      const nuevo=ACCESORIOS.find(a=>a.lvl===ahora);
      sFiesta(); confetti();
      setTimeout(()=>flash(`⭐ ¡${m.nombre} subió a nivel ${ahora}!${nuevo?` Desbloqueaste ${nuevo.emoji} ${nuevo.nombre}`:""}`),900);
    }
  }

  function hacerServicio(servId){
    if(estado.vetOcupada) return;
    const sv=SERVICIOS_VET.find(s=>s.id===servId);
    const m=estado.mascotas[estado.vetSel];
    if(!sv||!m) return;
    if(m[sv.stat]>=100){ return; }
    if(estado.efectivo<sv.costo){ sError(); flash(`Ese cuidado cuesta ${plata(sv.costo)} y no te alcanza 😅. ¡Pasá por el cajero! 🏧`); return; }

    estado.vetOcupada=true;
    estado.efectivo-=sv.costo;
    m[sv.stat]=100;
    // pequeño rebote del bicho + efecto del servicio
    const pet=document.getElementById("petEmoji");
    const fx=document.getElementById("vetFx");
    if(pet){ pet.classList.add("trabajando"); }
    lanzarFx(fx, servId);
    if(servId==="banar") sMoneda(); else if(servId==="cortar") sTecla(); else if(servId==="curar") sOk(); else sMoneda();

    setTimeout(()=>{
      estado.vetOcupada=false;
      sFiesta();
      sumarXP(m, 10);                 // cada cuidado da cariño
      const todoOk=estadoMascota(m).ok;
      if(todoOk){ confetti(); ganarMonedas(1); sumarXP(m, 20); }
      guardar();
      renderVet();
      flash(`✅ ${m.nombre} quedó ${sv.efecto}`);
      if(todoOk) setTimeout(()=>flash(`🏆 ¡${m.nombre} está perfecto! +1 🪙`),1200);
    }, 1500);
  }

  /* ---------- Ponerle / cambiarle el nombre a la mascota ---------- */
  function renombrarMascota(){
    const m=estado.mascotas[estado.vetSel]; if(!m) return;
    beep(600,.08);
    const ov=document.createElement("div"); ov.className="modal"; ov.id="modalNombre";
    ov.innerHTML=`<div class="modal-card" style="text-align:center">
      <div style="font-size:54px">${m.emoji}</div>
      <div class="titulo">¿Cómo se llama?</div>
      <input id="inpNombre" maxlength="12" value="${m.nombre}" placeholder="Nombre de la mascota"
        style="font-family:inherit;font-size:20px;padding:12px 14px;border-radius:14px;border:2px solid #cdd8ea;width:100%;text-align:center" />
      <button class="btn verde" id="okNombre" style="margin-top:12px">✅ ¡Listo!</button>
    </div>`;
    document.body.appendChild(ov);

    if(inp){ inp.focus(); try{inp.select();}catch(e){} }
    function confirmar(){

      sOk(); guardar(); ov.remove(); renderVet();
    }
    document.getElementById("okNombre").onclick=confirmar;
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter") confirmar(); });
    ov.addEventListener("click",e=>{ if(e.target===ov){ ov.remove(); renderVet(); } });
  }

  /* ---------- Mini-juego de baño: ¡frotá para limpiar! ---------- */
  function iniciarBano(){
    if(estado.vetOcupada) return;
    const m=estado.mascotas[estado.vetSel]; if(!m) return;
    const sv=SERVICIOS_VET.find(s=>s.id==="banar");
    if(m.limpieza>=99){ return; }
    if(estado.efectivo<sv.costo){ sError(); flash(`El baño cuesta ${plata(sv.costo)} y no te alcanza 😅. ¡Pasá por el cajero! 🏧`); return; }
    beep(520,.08);

    let prog=0, activo=false, listo=false;
    const ov=document.createElement("div"); ov.className="modal"; ov.id="modalBano";
    ov.innerHTML=`<div class="modal-card" style="text-align:center">
      <div class="titulo">🛁 ¡A bañar a ${m.nombre}!</div>
      <p style="margin:0 0 8px;opacity:.75">Frotá con el dedo (o el mouse) sobre la mascota 🧼</p>
      <div class="bano-tina" id="banoTina">
        <div class="bano-pet ${m.peludo&&m.pelo<50?"peludo":""}" id="banoPet">${m.emoji}</div>
        <div class="mugre" style="left:24%;top:30%"></div>
        <div class="mugre" style="left:60%;top:26%"></div>
        <div class="mugre" style="left:38%;top:58%"></div>
        <div class="mugre" style="left:66%;top:60%"></div>
        <div class="bano-suds" id="banoSuds"></div>
      </div>
      <div class="vs-bar" style="height:20px;margin-top:12px"><div class="vs-fill" id="banoFill" style="width:0%;background:#34b3ff"></div></div>
      <div id="banoTxt" style="font-weight:800;margin-top:6px">0%</div>
      <button class="btn gris" id="banoCerrar" style="margin-top:10px">Cancelar</button>
    </div>`;
    document.body.appendChild(ov);
    const tina=document.getElementById("banoTina");
    const fill=document.getElementById("banoFill");
    const txt=document.getElementById("banoTxt");
    const suds=document.getElementById("banoSuds");
    const pet=document.getElementById("banoPet");
    const mugres=[...ov.querySelectorAll(".mugre")];

    function frotar(clientX, clientY){
      if(listo) return;
      prog=Math.min(100, prog+4);
      fill.style.width=prog+"%"; txt.textContent=Math.round(prog)+"%";
      pet.classList.add("tiembla2");
      // burbujita donde froto
      const r=tina.getBoundingClientRect();
      const b=document.createElement("div"); b.className="sud";
      b.textContent=["🫧","💧","🫧"][Math.floor(Math.random()*3)];
      b.style.left=clamp((clientX-r.left)/r.width*100,0,100)+"%";
      b.style.top=clamp((clientY-r.top)/r.height*100,0,100)+"%";
      suds.appendChild(b); setTimeout(()=>b.remove(),700);
      if(Math.random()<.3) sTecla();
      // se van limpiando las manchas
      const idx=Math.floor(prog/25); for(let i=0;i<idx&&i<mugres.length;i++) mugres[i].style.opacity="0";
      if(prog>=100) terminar();
    }
    function terminar(){
      listo=true;
      estado.efectivo-=sv.costo; m.limpieza=100;
      sFiesta(); confetti(); sumarXP(m,10);
      const todoOk=estadoMascota(m).ok;
      if(todoOk){ ganarMonedas(1); sumarXP(m,20); }
      mugres.forEach(x=>x.style.opacity="0"); pet.classList.add("brilla2");
      txt.textContent="¡Limpio! ✨";
      guardar();
      setTimeout(()=>{ ov.remove(); renderVet(); flash(`✅ ${m.nombre} quedó bañado y brillante ✨`);
        if(todoOk) setTimeout(()=>flash(`🏆 ¡${m.nombre} está perfecto! +1 🪙`),1200); }, 700);
    }
    // mouse
    tina.addEventListener("mousedown",e=>{activo=true;frotar(e.clientX,e.clientY);});
    ov.addEventListener("mouseup",()=>{activo=false;});
    tina.addEventListener("mousemove",e=>{ if(activo) frotar(e.clientX,e.clientY); });
    // touch
    tina.addEventListener("touchstart",e=>{const t=e.touches[0];if(t)frotar(t.clientX,t.clientY);},{passive:true});
    tina.addEventListener("touchmove",e=>{const t=e.touches[0];if(t)frotar(t.clientX,t.clientY);e.preventDefault&&e.preventDefault();},{passive:false});
    document.getElementById("banoCerrar").onclick=()=>{ if(!listo){ beep(400,.08); ov.remove(); renderVet(); } };
  }

  function lanzarFx(fx, servId){
    if(!fx) return;
    fx.innerHTML="";
    const conf = {
      banar:{em:["🫧","💧","🫧","🛁","💦","🫧"], cls:"fx-sube"},
      cortar:{em:["✂️","💇","✂️","💈","✂️"], cls:"fx-corte"},
      curar:{em:["💉","✨","❤️‍🩹","✨","💊","✨"], cls:"fx-sube"},
      comer:{em:["🍖","😋","🦴","❤️","🍖"], cls:"fx-sube"},
    }[servId] || {em:["✨"],cls:"fx-sube"};
    conf.em.forEach((e,i)=>{
      const s=document.createElement("span");
      s.className="fxitem "+conf.cls; s.textContent=e;
      s.style.left=(15+Math.random()*70)+"%";
      s.style.animationDelay=(i*0.12)+"s";
      fx.appendChild(s);
    });
    setTimeout(()=>{ if(fx) fx.innerHTML=""; }, 1600);
  }

  /* =====================================================================
     MASCOTAS: desgaste con el tiempo (se ensucian / tienen hambre solas)
     ===================================================================== */
  function aplicarDecay(){
    const now=Date.now();
    estado.mascotas.forEach(m=>{
      if(!m.t){ m.t=now; return; }
      const min=(now-m.t)/60000;
      if(min<=0){ m.t=now; return; }
      m.limpieza=clamp(m.limpieza-DECAY.limpieza*min,0,100);
      m.animo   =clamp(m.animo   -DECAY.animo   *min,0,100);
      m.salud   =clamp(m.salud   -DECAY.salud   *min,0,100);
      if(m.peludo) m.pelo=clamp(m.pelo-DECAY.pelo*min,0,100);
      m.t=now;
    });
  }
  // cuidado más urgente de una mascota (o null si está bien)
  function mascotaNecesita(m){
    const arr=[["limpieza","🛁",m.limpieza],["animo","🍖",m.animo],["salud","❤️",m.salud]];
    if(m.peludo) arr.push(["pelo","✂️",m.pelo]);
    arr.sort((a,b)=>a[2]-b[2]);
    return arr[0][2]<45 ? {stat:arr[0][0],emoji:arr[0][1],val:Math.round(arr[0][2])} : null;
  }

  /* =====================================================================
     MISIÓN: lista de compras con presupuesto
     ===================================================================== */
  function nuevaMision(){
    const porTienda={};
    PRODUCTOS.forEach(p=>{ (porTienda[p.tienda]=porTienda[p.tienda]||[]).push(p); });
    const tiendas=Object.keys(porTienda).sort(()=>Math.random()-.5).slice(0,3);
    const items=tiendas.map(t=>{ const arr=porTienda[t]; return arr[Math.floor(Math.random()*arr.length)]; })
      .map(p=>({id:p.id,emoji:p.emoji,nombre:p.nombre,precio:p.precio,tienda:p.tienda}));
    const suma=items.reduce((a,b)=>a+b.precio,0);
    const presupuesto=Math.ceil((suma*1.2)/10)*10;
    estado.mision={items, presupuesto, hechos:[], gastado:0, completada:false};
  }
  function chequearMision(carrito){
    if(!estado.mision||estado.mision.completada) return false;
    let nuevo=false;
    for(const id of Object.keys(carrito)){
      const it=estado.mision.items.find(x=>x.id===id);
      if(it && !estado.mision.hechos.includes(id)){
        estado.mision.hechos.push(id); estado.mision.gastado+=it.precio; nuevo=true;
      }
    }
    if(estado.mision.hechos.length===estado.mision.items.length){ estado.mision.completada=true; }
    return nuevo;
  }
  function abrirMision(){
    const m=estado.mision; if(!m)return;
    const filas=m.items.map(it=>{
      const ok=m.hechos.includes(it.id);
      return `<div class="mi-fila ${ok?"ok":""}">
        <span>${ok?"✅":"⬜"} ${it.emoji} ${it.nombre}</span>
        <span>${plata(it.precio)} · ${it.tienda}</span></div>`;
    }).join("");
    const dentro = m.gastado<=m.presupuesto;
    const ov=document.createElement("div"); ov.className="modal"; ov.id="modalMision";
    ov.innerHTML=`<div class="modal-card">
      <div class="titulo">📋 Lista de compras</div>
      <p style="text-align:center;margin:0 0 10px;opacity:.75">Comprá toda la lista sin pasarte del presupuesto 💡</p>
      <div class="mi-lista">${filas}</div>
      <div class="mi-pres">💰 Presupuesto: <b>${plata(m.presupuesto)}</b> · Gastado: <b style="color:${dentro?"var(--verde-osc)":"var(--rojo)"}">${plata(m.gastado)}</b></div>
      <div class="mi-prog">${m.hechos.length}/${m.items.length} cosas ✓ ${m.completada?"— ¡completada! 🎉":""}</div>
      <button class="btn verde" id="cerrarMision">¡A comprar! 🛍️</button>
    </div>`;
    document.body.appendChild(ov);
    ov.onclick=(e)=>{ if(e.target===ov||e.target.id==="cerrarMision"){ beep(400,.08); ov.remove(); } };
  }
  function botonMision(estilo){
    if(!estado.mision) return "";
    const m=estado.mision;
    return `<button class="mision-btn" id="misionBtn" style="${estilo}">📋
      <span class="mb-badge">${m.hechos.length}/${m.items.length}</span></button>`;
  }

  /* =====================================================================
     MERCADO — vender cosas y cobrar con QR / tarjeta / efectivo
     ===================================================================== */
  const precioVenta = p => Math.max(5, Math.round(p*0.6));   // se revende al 60%
  function renderVender(){
    const items=Object.entries(estado.inventario).filter(([id,c])=>c>0).map(([id,c])=>{
      const p=PRODUCTOS.find(x=>x.id===id); if(!p)return"";
      return `<div class="producto" data-vender="${id}">
        <div class="badge">${c}</div>
        <div class="pemoji">${p.emoji}</div><div class="pnombre">${p.nombre}</div>
        <div class="pprecio">Vendés por ${plata(precioVenta(p.precio))}</div></div>`;}).join("");
    const vacio = !items;

    $app().innerHTML=`<div class="tienda-bg"></div>
      <div class="vista">
        ${cabecera("💱 Mercado · Vender")}
        ${hud()}
        <div class="globo" style="margin-top:6px">Vendé las cosas que compraste. Si te pagan con
          <b>📱 QR</b> o <b>💳 tarjeta</b>, la plata va a tu <b>cuenta del banco 🏦</b>.
          Si te pagan en <b>💵 efectivo</b>, va a tu <b>billetera 👛</b>.</div>
        ${vacio
          ? `<div class="panel" style="text-align:center"><div style="font-size:54px">🪙</div>
              <div class="titulo">No tenés nada para vender</div>
              <p style="opacity:.75">Comprá cosas en las tiendas y volvé al Mercado para revenderlas.</p>
              <button class="btn gris" id="almall3">🏬 Volver al shopping</button></div>`
          : `<div class="productos">${items}</div>`}
      </div>`;

    document.getElementById("volver").onclick=()=>{beep(400,.08);irA("mall");};
    const a3=document.getElementById("almall3"); if(a3)a3.onclick=()=>{beep(400,.08);irA("mall");};
    $app().querySelectorAll("[data-vender]").forEach(el=>el.onclick=()=>elegirCobro(el.dataset.vender));
  }
  function elegirCobro(id){
    const p=PRODUCTOS.find(x=>x.id===id); if(!p)return;
    const monto=precioVenta(p.precio);
    beep(600,.08);
    const ov=document.createElement("div"); ov.className="modal"; ov.id="modalCobro";
    ov.innerHTML=`<div class="modal-card" style="text-align:center">
      <div style="font-size:48px">${p.emoji}</div>
      <div class="titulo">Vender ${p.nombre}</div>
      <p style="margin:0 0 4px">Te pagan <b>${plata(monto)}</b>. ¿Cómo querés cobrar?</p>
      <div class="cobro-ops">
        <button class="cobro qr" data-via="qr"><span class="cv-e">📱</span><span>QR</span><small>al banco 🏦</small></button>
        <button class="cobro tar" data-via="tarjeta"><span class="cv-e">💳</span><span>Tarjeta</span><small>al banco 🏦</small></button>
        <button class="cobro efe" data-via="efectivo"><span class="cv-e">💵</span><span>Efectivo</span><small>a la billetera 👛</small></button>
      </div>
      <button class="btn gris" id="cobroCancel" style="margin-top:6px">Cancelar</button>
    </div>`;
    document.body.appendChild(ov);
    ov.querySelectorAll("[data-via]").forEach(b=>b.onclick=()=>cobrar(id, monto, b.dataset.via, ov));
    document.getElementById("cobroCancel").onclick=()=>{ beep(400,.08); ov.remove(); };
    ov.addEventListener("click",e=>{ if(e.target===ov) ov.remove(); });
  }
  function cobrar(id, monto, via, ov){
    // descontar del inventario
    estado.inventario[id]=(estado.inventario[id]||1)-1;
    if(estado.inventario[id]<=0) delete estado.inventario[id];
    let destino;
    if(via==="efectivo"){ estado.efectivo+=monto; destino="billetera 👛"; sMoneda(); }
    else { estado.saldoBanco+=monto; destino="cuenta del banco 🏦"; sCaja(); }
    confetti(); guardar();
    if(ov) ov.remove();
    renderVender();
    const comoPago = via==="qr" ? "con QR 📱" : (via==="tarjeta" ? "con tarjeta 💳" : "en efectivo 💵");
    flash(`✅ Vendido ${comoPago}. ${plata(monto)} fueron a tu ${destino}`);
  }

  /* ---------- Pasear / mimar a la mascota (sube ánimo) ---------- */
  function pasear(host){
    const m=estado.mascotas[0]; if(!m) return;
    aplicarDecay();
    m.animo=clamp(m.animo+18,0,100); sumarXP(m,5);
    sAnimal(m.id); guardar();
    if(host){
      const b=document.createElement("div"); b.className="burbuja"; b.textContent="❤️ ¡Le encanta!";
      host.appendChild(b); setTimeout(()=>b.remove(),1200);
      host.style.transition="transform .2s"; host.style.transform=(host.style.transform||"")+" translateY(-8px)";
      setTimeout(()=>{ host.style.transform=host.style.transform.replace(" translateY(-8px)",""); },220);
    }
  }

  /* ---------- Álbum de mascotas ---------- */
  function botonAlbum(estilo){
    if(!estado.mascotas.length) return "";
    return `<button class="mision-btn" id="albumBtn" style="${estilo}">📔
      <span class="mb-badge">${estado.mascotas.length}🐾</span></button>`;
  }
  function abrirAlbum(){
    aplicarDecay();
    const filas=estado.mascotas.map(m=>{
      const prom=Math.round((m.limpieza+m.pelo+m.salud+m.animo)/4);
      return `<div class="alb-fila">
        <span class="alb-emoji">${m.emoji}${m.accesorio?`<small>${accEmoji(m.accesorio)}</small>`:""}</span>
        <span class="alb-info"><b>${m.nombre}</b> · ${m.tipo}<br>
          <small>⭐ Nivel ${nivelDe(m.xp)} · estado ${prom}%</small></span></div>`;
    }).join("");
    const ov=document.createElement("div"); ov.className="modal"; ov.id="modalAlbum";
    ov.innerHTML=`<div class="modal-card">
      <div class="titulo">📔 Mi Álbum de Mascotas</div>
      <p style="text-align:center;margin:0 0 8px;opacity:.7">Tenés ${estado.mascotas.length} mascota(s) 🐾</p>
      <div class="alb-lista">${filas}</div>
      <button class="btn verde" id="cerrarAlbum">Cerrar</button></div>`;
    document.body.appendChild(ov);
    ov.onclick=(e)=>{ if(e.target===ov||e.target.id==="cerrarAlbum"){ beep(400,.08); ov.remove(); } };
  }

  /* ---------- flash de aviso ---------- */
  let flashT=null;
  function flash(txt){
    let g=document.getElementById("flashG");
    if(!g){g=document.createElement("div");g.id="flashG";g.className="globo tiembla";
      g.style.position="absolute";g.style.left="12px";g.style.right="12px";g.style.bottom="84px";g.style.zIndex=50;
      $app().appendChild(g);}
    g.innerHTML=txt; clearTimeout(flashT); flashT=setTimeout(()=>{if(g)g.remove();},2500);
  }

  /* ---------- Arranque ---------- */
  window.addEventListener("DOMContentLoaded",()=>{ cargar(); if(!estado.mision) nuevaMision(); render(); });
  </script>
</body>
</html>
